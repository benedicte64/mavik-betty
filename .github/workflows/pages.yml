name: Deploy MAVIK Betty to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate MAVIK before production
        run: |
          npm run check
          npm run check:accessibility
          npm run check:betty
          node tests/quote-workflow-smoke.js
          node tests/reputation-client-intake-smoke.js
          node tests/jarvis-intelligence-smoke.js
          node tests/command-dock-messaging-smoke.js
          node tests/software-company-calendar-smoke.js
          node tests/intervention-report-smoke.js
          node tests/quote-studio-planning-smoke.js
          node tests/employee-flow-leave-morale-smoke.js
          node tests/emergency-quote-request-calendar-smoke.js
          node tests/workshop-online-smoke.js
          node tests/continuous-session-legal-admin-smoke.js
          node tests/photo-industrial-delivery-workshop-smoke.js
          npm --prefix ../templates/mavik-client-vierge test

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
