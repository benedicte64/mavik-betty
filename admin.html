<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GCOS — Administration</title><style>:root{--p:#171a21;--p2:#20242d;--t:#f7f7f8;--m:#a9afbd;--y:#ffd400;--bd:#303641}*{box-sizing:border-box}body{margin:0;background:#0d0f13;color:var(--t);font-family:system-ui}.app{max-width:1200px;margin:auto;padding:18px}.top,.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn,.tile{border:1px solid var(--bd);background:var(--p2);color:var(--t);border-radius:14px;padding:14px;text-decoration:none}.primary{background:var(--y);color:#111;font-weight:900}.card{background:var(--p);border:1px solid var(--bd);border-radius:18px;padding:16px;margin:13px 0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.tile strong{display:block;font-size:1.1rem}.muted{color:var(--m)}.alert{border-left:5px solid var(--y)}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}@media(max-width:480px){.grid{grid-template-columns:1fr}}</style></head><body><div class="app"><header class="top"><div><h1>Centre de pilotage GCOS</h1><div class="muted" id="who"></div></div><div class="actions"><a class="btn" href="index.html">Accueil</a><a class="btn" href="https://mail.google.com/mail/u/0/#inbox" target="_blank">📨 Mails GentleCarE</a><a class="btn primary" href="transmettre-document.html">📎 Transmettre un document</a><a class="btn primary" href="gestion.html" target="_blank">Ouvrir Gestion ↗</a></div></header><section class="card alert"><h2>Facturation à lancer</h2><div id="billing"></div></section><section class="card"><h2>Documents et opérations</h2><div class="grid" id="modules"></div></section><section class="card"><h2>Derniers rapports atelier</h2><div id="reports"></div></section></div><script>const session=JSON.parse(sessionStorage.getItem('jarvis-session')||'null'),accounts=JSON.parse(localStorage.getItem('jarvis-accounts')||'[]'),user=accounts.find(a=>a.id===session?.id);if(!user||user.role!=='direction')location.href='index.html';who.textContent='Accès administrateur : '+user.name;const modules=[['Clients','Contacts, prospects et historiques'],['Véhicules','Dossiers, photos et interventions'],['Devis','Offres et validations'],['Commandes','Achats, cautions et livraisons'],['Fournisseurs','Contacts et documents techniques'],['Stocks','Glace, Dinitrol et consommables'],['Interventions','Rapports et contrôle qualité'],['Documents','Centre documentaire'],['Messagerie','Messages, assistance et urgences'],['Journal Jarvis','Décisions et actions'],['Formation','Compétences et habilitations'],['Planning','Organisation atelier']];modules.innerHTML=modules.map(m=>'<div class="tile"><strong>'+m[0]+'</strong><span class="muted">'+m[1]+'</span></div>').join('');function render(){let q=JSON.parse(localStorage.getItem('gcos-billing-queue')||'[]');billing.innerHTML=q.length?q.slice().reverse().map(x=>'<div class="tile"><strong>'+x.vehicle+' — '+x.client+'</strong><div class="muted">Prêt le '+new Date(x.readyAt).toLocaleString('fr-FR')+'</div><div class="actions" style="margin-top:8px"><button class="btn primary" onclick="markBilled('+x.id+')">Facturation lancée</button><button class="btn" onclick="showReport('+x.id+')">Voir le rapport</button></div></div>').join(''):'<div class="muted">Aucune intervention en attente de facturation.</div>';let files=JSON.parse(localStorage.getItem('gcos-vehicle-files')||'{}'),all=[];Object.values(files).forEach(f=>(f.reports||[]).forEach(r=>all.push(r)));reports.innerHTML=all.length?all.slice(-10).reverse().map(r=>'<div class="tile"><strong>'+r.vehicle+'</strong><div>'+r.client+' • '+r.employee+'</div><div class="muted">'+new Date(r.createdAt).toLocaleString('fr-FR')+' — '+r.iceKg+' kg de glace — '+r.dinitrolL+' L Dinitrol</div></div>').join(''):'<div class="muted">Aucun rapport disponible.</div>'}function markBilled(id){let q=JSON.parse(localStorage.getItem('gcos-billing-queue')||'[]'),x=q.find(a=>a.id===id);if(x)x.status='Facturation lancée';localStorage.setItem('gcos-billing-queue',JSON.stringify(q));render()}function showReport(id){let q=JSON.parse(localStorage.getItem('gcos-billing-queue')||'[]'),x=q.find(a=>a.id===id);alert(x?JSON.stringify(x.report,null,2):'Rapport introuvable')}render();</script><script src="gcos-comms.js?v=2"></script></body></html>
