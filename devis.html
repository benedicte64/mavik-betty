<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>GCOS — Devis</title><meta name="theme-color" content="#07131a"><style>:root{--bg:#061014;--panel:#0b1b22;--line:#24424d;--txt:#f4fbfd;--muted:#87a1aa;--cyan:#57d7ef;--green:#79d45d;--amber:#f0b54a;--red:#ef6363}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#071318,#04090c);color:var(--txt);font-family:Inter,system-ui,sans-serif;min-height:100vh}.top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(5,15,19,.94);border-bottom:1px solid var(--line)}a{color:inherit}.wrap{max-width:1450px;margin:auto;padding:18px}.hero,.card{border:1px solid var(--line);background:linear-gradient(180deg,#0d2028,#09171d);border-radius:18px}.hero{padding:20px;display:flex;justify-content:space-between;gap:12px;align-items:end}.hero h1{margin:0 0 5px}.muted{color:var(--muted)}.btn{border:1px solid var(--line);background:#10242c;color:var(--txt);border-radius:10px;padding:10px 13px;cursor:pointer;text-decoration:none}.btn.primary{background:#275f40;border-color:#438d60;font-weight:800}.btn.warn{background:#4a3517}.btn.danger{background:#4a2020}.grid{display:grid;grid-template-columns:1fr 1.2fr;gap:14px;margin-top:14px}.card{padding:16px}.row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field{display:grid;gap:5px;margin-bottom:10px}label{font-size:.8rem;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#07151b;color:var(--txt);padding:10px}textarea{min-height:80px;resize:vertical}.lines{display:grid;gap:8px}.line{display:grid;grid-template-columns:2fr .6fr .8fr .8fr auto;gap:7px;align-items:center}.totals{margin-top:12px;margin-left:auto;max-width:340px;display:grid;gap:7px}.total{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line)}.total.final{font-size:1.2rem;font-weight:900}.actions{display:flex;gap:8px;flex-wrap:wrap}.list{display:grid;gap:9px}.quote{border:1px solid var(--line);border-radius:14px;padding:13px;background:#0b1b22}.quotehead{display:flex;justify-content:space-between;gap:10px}.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#173d2c;color:#9df0b7;font-size:.72rem}.badge.draft{background:#313743;color:#d7e2eb}.badge.sent{background:#183954;color:#a9dcff}.badge.refused{background:#4a2020;color:#ffb2b2}@media(max-width:850px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.line{grid-template-columns:1fr 70px 90px}.line .sum{display:none}.hero{align-items:flex-start}.wrap{padding:10px 10px 80px}}@media print{.top,.hero .actions,#history,.btn,.removeLine{display:none!important}body{background:#fff;color:#000}.wrap{padding:0}.hero,.card{border:0;background:#fff}.grid{display:block}#editor{box-shadow:none}.field input,.field select,.field textarea{border:0;color:#000;background:#fff;padding:2px}.line{grid-template-columns:2fr .6fr .8fr .8fr auto}}</style></head><body><header class="top"><strong>GCOS — Devis</strong><a class="btn" href="admin.html">← Administration</a></header><main class="wrap"><section class="hero"><div><h1>Devis et conversion atelier</h1><div class="muted">Création, validation et transformation en ordre de travail.</div></div><div class="actions"><button class="btn" onclick="newQuote()">Nouveau</button><button class="btn primary" onclick="saveQuote()">Enregistrer</button><button class="btn" onclick="window.print()">Imprimer / PDF</button></div></section><section class="grid"><article class="card" id="editor"><div class="row"><div class="field"><label>N° de devis</label><input id="number" readonly></div><div class="field"><label>Statut</label><select id="status"><option>Brouillon</option><option>Envoyé</option><option>Accepté</option><option>Refusé</option></select></div></div><div class="row"><div class="field"><label>Client</label><select id="client"></select></div><div class="field"><label>Véhicule</label><select id="vehicle"></select></div></div><div class="row"><div class="field"><label>Date</label><input type="date" id="date"></div><div class="field"><label>Validité</label><input type="date" id="validUntil"></div></div><div class="field"><label>Objet</label><input id="title" value="Pack Intégral Cryo + Dinitrol"></div><div class="field"><label>Détail des prestations</label><div id="lines" class="lines"></div><button class="btn" onclick="addLine()">+ Ajouter une ligne</button></div><div class="row"><div class="field"><label>Remise (%)</label><input id="discount" type="number" min="0" max="100" value="0" oninput="calculate()"></div><div class="field"><label>TVA (%)</label><input id="vat" type="number" min="0" value="20" oninput="calculate()"></div></div><div class="field"><label>Conditions / observations</label><textarea id="notes">Devis valable 30 jours. Intervention sur rendez-vous. Les travaux supplémentaires nécessitent l'accord du client.</textarea></div><div class="totals"><div class="total"><span>Total HT</span><strong id="ht">0,00 €</strong></div><div class="total"><span>TVA</span><strong id="tax">0,00 €</strong></div><div class="total final"><span>Total TTC</span><strong id="ttc">0,00 €</strong></div></div><div class="actions" style="margin-top:14px"><button class="btn primary" onclick="setAccepted()">Accepter</button><button class="btn warn" onclick="convertToOrder()">Créer l'ordre atelier</button><button class="btn danger" onclick="deleteQuote()">Supprimer</button></div></article><aside class="card" id="history"><h2>Historique des devis</h2><div class="field"><input id="search" placeholder="Rechercher client, véhicule ou numéro" oninput="renderHistory()"></div><div id="quoteList" class="list"></div></aside></section></main><script src="storage.js"></script><script>let clients=[],vehicles=[],quotes=[],currentId=null;const euro=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);const esc=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));function qNumber(){return'DV-'+new Date().getFullYear()+'-'+String(Date.now()).slice(-6)}function addLine(data={label:'',qty:1,unit:0}){const el=document.createElement('div');el.className='line';el.innerHTML='<input class="lbl" placeholder="Prestation" value="'+esc(data.label)+'"><input class="qty" type="number" min="0" step=".1" value="'+data.qty+'" oninput="calculate()"><input class="unit" type="number" min="0" step=".01" value="'+data.unit+'" oninput="calculate()"><strong class="sum">0,00 €</strong><button class="btn removeLine" onclick="this.parentNode.remove();calculate()">×</button>';lines.appendChild(el);calculate()}function getLines(){return[...lines.children].map(x=>({label:x.querySelector('.lbl').value.trim(),qty:+x.querySelector('.qty').value||0,unit:+x.querySelector('.unit').value||0}))}function calculate(){let subtotal=0;[...lines.children].forEach(x=>{const v=(+x.querySelector('.qty').value||0)*(+x.querySelector('.unit').value||0);subtotal+=v;x.querySelector('.sum').textContent=euro(v)});const net=subtotal*(1-(+discount.value||0)/100),t=net*(+vat.value||0)/100;ht.textContent=euro(net);tax.textContent=euro(t);ttc.textContent=euro(net+t);return{subtotal,ht:net,tax:t,ttc:net+t}}function populate(){client.innerHTML='<option value="">Sélectionner</option>'+clients.map(c=>'<option value="'+c.id+'">'+esc(c.name||[c.firstName,c.lastName].filter(Boolean).join(' '))+'</option>').join('');refreshVehicles();client.onchange=refreshVehicles}function refreshVehicles(){const id=client.value;const list=id?vehicles.filter(v=>v.clientId===id):vehicles;vehicle.innerHTML='<option value="">Sélectionner</option>'+list.map(v=>'<option value="'+v.id+'">'+esc([v.brand,v.model,v.plate].filter(Boolean).join(' — '))+'</option>').join('')}function newQuote(){currentId=null;number.value=qNumber();status.value='Brouillon';date.value=new Date().toISOString().slice(0,10);validUntil.value=new Date(Date.now()+30*86400000).toISOString().slice(0,10);title.value='Pack Intégral Cryo + Dinitrol';discount.value=0;vat.value=20;notes.value='Devis valable 30 jours. Intervention sur rendez-vous. Les travaux supplémentaires nécessitent l’accord du client.';lines.innerHTML='';addLine({label:'Cryonettoyage complet du soubassement, moteur et passages de roues',qty:1,unit:900});addLine({label:'Protection anticorrosion Dinitrol',qty:1,unit:600});client.value='';refreshVehicles()}async function saveQuote(){const totals=calculate();const data={id:currentId||undefined,number:number.value,status:status.value,clientId:client.value,vehicleId:vehicle.value,date:date.value,validUntil:validUntil.value,title:title.value.trim(),lines:getLines(),discount:+discount.value||0,vat:+vat.value||0,notes:notes.value.trim(),...totals};const saved=await JarvisStorage.put('quotes',data);currentId=saved.id;await JarvisStorage.audit('quote.saved','quotes',saved.id,{number:saved.number,status:saved.status});await load();alert('Devis enregistré')}async function loadQuote(id){const q=quotes.find(x=>x.id===id);if(!q)return;currentId=q.id;number.value=q.number;status.value=q.status||'Brouillon';client.value=q.clientId||'';refreshVehicles();vehicle.value=q.vehicleId||'';date.value=q.date||'';validUntil.value=q.validUntil||'';title.value=q.title||'';discount.value=q.discount||0;vat.value=q.vat??20;notes.value=q.notes||'';lines.innerHTML='';(q.lines||[]).forEach(addLine);calculate();scrollTo({top:0,behavior:'smooth'})}async function setAccepted(){status.value='Accepté';await saveQuote()}async function convertToOrder(){if(!currentId)await saveQuote();const q=await JarvisStorage.get('quotes',currentId);if(!q)return;const existing=(await JarvisStorage.all('orders')).find(o=>o.quoteId===q.id);if(existing){alert('Un ordre de travail existe déjà pour ce devis.');return}q.status='Accepté';await JarvisStorage.put('quotes',q);const order=await JarvisStorage.put('orders',{quoteId:q.id,clientId:q.clientId,vehicleId:q.vehicleId,title:q.title,status:'À planifier',plannedAt:null,checklist:{reception:false,photosBefore:false,protection:false,cryo:false,dinitrol:false,photosAfter:false,quality:false},amountTtc:q.ttc});await JarvisStorage.audit('order.created','orders',order.id,{quoteId:q.id});await load();alert('Ordre atelier créé et placé À planifier.')}async function deleteQuote(){if(!currentId||!confirm('Supprimer ce devis ?'))return;await JarvisStorage.remove('quotes',currentId);await JarvisStorage.audit('quote.deleted','quotes',currentId,{});newQuote();await load()}function nameOf(c){return c?.name||[c?.firstName,c?.lastName].filter(Boolean).join(' ')||'Client'}function vehicleOf(v){return[v?.brand,v?.model,v?.plate].filter(Boolean).join(' — ')||'Véhicule'}function renderHistory(){const s=search.value.toLowerCase();const list=quotes.filter(q=>{const c=nameOf(clients.find(x=>x.id===q.clientId)),v=vehicleOf(vehicles.find(x=>x.id===q.vehicleId));return(q.number+' '+c+' '+v).toLowerCase().includes(s)}).sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));quoteList.innerHTML=list.length?list.map(q=>{const c=nameOf(clients.find(x=>x.id===q.clientId)),v=vehicleOf(vehicles.find(x=>x.id===q.vehicleId)),cls=q.status==='Brouillon'?'draft':q.status==='Envoyé'?'sent':q.status==='Refusé'?'refused':'';return'<div class="quote" onclick="loadQuote(\''+q.id+'\')"><div class="quotehead"><strong>'+esc(q.number)+'</strong><span class="badge '+cls+'">'+esc(q.status)+'</span></div><div>'+esc(c)+'</div><div class="muted">'+esc(v)+'</div><div style="margin-top:7px"><strong>'+euro(q.ttc)+'</strong></div></div>'}).join(''):'<div class="muted">Aucun devis.</div>'}async function load(){clients=await JarvisStorage.all('clients');vehicles=await JarvisStorage.all('vehicles');quotes=await JarvisStorage.all('quotes');populate();renderHistory()}(async()=>{await load();newQuote()})();</script></body></html>
