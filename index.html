<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111318">
<link rel="manifest" href="manifest.webmanifest"><title>Jarvis GentleCarE</title>
<style>
:root{--bg:#0d0f13;--panel:#171a21;--panel2:#20242d;--text:#f7f7f8;--muted:#a9afbd;--yellow:#ffd400;--purple:#8b5cf6;--green:#22c55e;--red:#ef4444;--border:#303641}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,#0b0d11,#12151b);color:var(--text);min-height:100vh}button,input,select,textarea{font:inherit}.app{max-width:1280px;margin:auto;padding:18px}.topbar{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.brand-logo{width:58px;height:58px;border-radius:14px;background:#fff;padding:5px;object-fit:contain}.brand h1{margin:0;font-size:1.35rem}.muted{color:var(--muted)}.nav{display:flex;gap:8px;overflow:auto;padding-bottom:6px}.nav button,.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:12px;padding:10px 14px;cursor:pointer}.nav button.active{background:var(--yellow);color:#111;border-color:var(--yellow);font-weight:800}.jarvis{background:linear-gradient(135deg,#6d28d9,#9f67ff);border:0;font-weight:800}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(23,26,33,.95);border:1px solid var(--border);border-radius:18px;padding:16px}.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-6{grid-column:span 6}.span-4{grid-column:span 4}.hero{display:flex;justify-content:space-between;gap:16px;align-items:center}.hero h2{font-size:clamp(1.7rem,4vw,3rem);margin:0 0 8px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:var(--panel2);padding:14px;border-radius:14px;cursor:pointer;border:1px solid transparent}.stat:hover{border-color:var(--yellow)}.stat strong{display:block;font-size:1.55rem}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.section-title h3{margin:0}.list{display:flex;flex-direction:column;gap:10px}.item{background:var(--panel2);border-radius:14px;padding:13px;display:flex;gap:12px;justify-content:space-between;align-items:center}.item-title{font-weight:800}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:.78rem;font-weight:800;background:#343945}.badge.green{background:#123e23;color:#76ef9d}.badge.red{background:#4b1717;color:#ff9393}.badge.yellow{background:#5b4d00;color:#ffe45c}.badge.purple{background:#34205a;color:#cdb2ff}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn.primary{background:var(--yellow);color:#111;border-color:var(--yellow);font-weight:900}.btn.success{background:#14532d}.btn.danger{background:#5f1d1d}.btn.small{padding:7px 10px;font-size:.85rem}.search,textarea,select{width:100%;border:1px solid var(--border);background:#101319;color:var(--text);border-radius:12px;padding:12px}.footer{padding:28px 0;color:var(--muted);text-align:center}.modal,.login{position:fixed;inset:0;background:rgba(8,9,12,.96);display:grid;place-items:center;padding:18px;z-index:50}.modal-card,.login-card{width:min(680px,100%);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:22px}.profiles{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}.profile{padding:20px 12px;border:1px solid var(--border);background:var(--panel2);border-radius:16px;color:var(--text);font-weight:800}.pin{font-size:1.5rem;letter-spacing:.5rem;text-align:center}.rights{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.right{background:var(--panel2);padding:10px;border-radius:10px}.userchip{display:flex;align-items:center;gap:8px}.dot{width:10px;height:10px;border-radius:50%;background:var(--green)}@media(max-width:900px){.span-8,.span-6,.span-4{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}.hero,.topbar{align-items:flex-start;flex-direction:column}.nav{width:100%}}@media(max-width:560px){.app{padding:12px}.item{align-items:flex-start;flex-direction:column}.actions{width:100%}.actions .btn{flex:1}.profiles,.rights{grid-template-columns:1fr}}
</style></head>
<body>
<div id="loginRoot"></div>
<div class="app" id="app" hidden><header class="topbar"><div class="brand"><img class="brand-logo" src="icon.svg" alt="Logo GentleCarE"><div><h1>Jarvis GentleCarE</h1><div class="muted" id="today"></div></div></div><div class="actions"><div class="userchip"><span class="dot"></span><strong id="currentUser"></strong></div><button class="btn small" onclick="logout()">Déconnexion</button><button class="btn jarvis" id="jarvisBtn">🎤 Parler à Jarvis</button></div></header><nav class="nav" id="nav"></nav><main id="content"></main><div class="footer">Jarvis GentleCarE • accès protégé par code personnel</div></div><div id="modalRoot"></div>
<script>
const defaultAccounts=[
{id:'david',name:'David',role:'direction',pin:null,rights:{tasks:true,quotes:true,orders:true,workshop:true,direction:true,users:true}},
{id:'bene',name:'Bénédicte',role:'direction',pin:null,rights:{tasks:true,quotes:true,orders:true,workshop:true,direction:true,users:true}}
];
const seed={tasks:[{id:'t1',title:'Vérifier activation du compte LDLC Pro',domain:'Commercial',priority:'Haute',done:false},{id:'t2',title:'Appeler MMA pour finaliser l’assurance',domain:'Direction',priority:'Haute',done:false}],quotes:[{id:'q1',client:'Client Club Mustang',vehicle:'Audi S5 V8',amount:1050,status:'À valider',offer:'Pass Fondateur –30 %'}],orders:[{id:'o1',supplier:'Intelblast',label:'Machine cryogénique',amount:9900,status:'À confirmer',detail:'Livraison fin août/début septembre'},{id:'o2',supplier:'France Air',label:'Compresseur',amount:500,status:'Bloqué technique',detail:'Validation électrique'}],interventions:[{id:'i1',client:'Béné',vehicle:'Mini blanche 2005',status:'Préparation',date:new Date().toISOString(),notes:'Corrosion : dessous, moteur et passages de roues'}],journal:[]};
let accounts=JSON.parse(localStorage.getItem('jarvis-accounts')||'null')||structuredClone(defaultAccounts);let state=JSON.parse(localStorage.getItem('gcos-state')||'null')||structuredClone(seed);let session=JSON.parse(sessionStorage.getItem('jarvis-session')||'null');let user=null,page='Accueil';
function saveAccounts(){localStorage.setItem('jarvis-accounts',JSON.stringify(accounts))}function save(){localStorage.setItem('gcos-state',JSON.stringify(state))}function log(text){state.journal.unshift({id:crypto.randomUUID(),at:new Date().toISOString(),text:`${user?.name||'Utilisateur'} — ${text}`});save()}
function startLogin(){document.getElementById('app').hidden=true;document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><img class="brand-logo" src="icon.svg" alt="Logo" style="margin:auto"><h2>Jarvis GentleCarE</h2><p class="muted">Choisissez votre profil.</p><div class="profiles">${accounts.map(a=>`<button class="profile" onclick="selectAccount('${a.id}')">👤 ${a.name}<br><span class="muted">${a.role==='direction'?'Direction':'Employé'}</span></button>`).join('')}</div></div></div>`}
function selectAccount(id){let a=accounts.find(x=>x.id===id);if(!a)return;if(!a.pin)return setupPin(a);askPin(a)}
function setupPin(a){document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><h2>Créer le code de ${a.name}</h2><p class="muted">Choisissez un code personnel à 4 chiffres, puis confirmez-le.</p><input id="pin1" class="search pin" inputmode="numeric" maxlength="4" placeholder="••••"><input id="pin2" class="search pin" inputmode="numeric" maxlength="4" placeholder="••••" style="margin-top:10px"><button class="btn primary" style="width:100%;margin-top:12px" onclick="confirmPin('${a.id}')">Enregistrer mon code</button><button class="btn" style="width:100%;margin-top:8px" onclick="startLogin()">Retour</button></div></div>`}
function confirmPin(id){let p1=document.getElementById('pin1').value,p2=document.getElementById('pin2').value;if(!/^\d{4}$/.test(p1))return alert('Le code doit contenir exactement 4 chiffres.');if(p1!==p2)return alert('Les deux codes ne correspondent pas.');let a=accounts.find(x=>x.id===id);a.pin=p1;saveAccounts();openSession(a)}
function askPin(a){document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><h2>Bonjour ${a.name}</h2><p class="muted">Saisissez votre code à 4 chiffres.</p><input id="pin" class="search pin" inputmode="numeric" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter')verifyPin('${a.id}')"><button class="btn primary" style="width:100%;margin-top:12px" onclick="verifyPin('${a.id}')">Se connecter</button><button class="btn" style="width:100%;margin-top:8px" onclick="startLogin()">Retour</button></div></div>`;setTimeout(()=>document.getElementById('pin').focus(),50)}
function verifyPin(id){let a=accounts.find(x=>x.id===id),p=document.getElementById('pin').value;if(p!==a.pin)return alert('Code incorrect.');openSession(a)}
function openSession(a){session={id:a.id,at:Date.now()};sessionStorage.setItem('jarvis-session',JSON.stringify(session));user=a;if(a.role==='employee'){location.href='employe.html';return}boot()}
function logout(){sessionStorage.removeItem('jarvis-session');location.reload()}
function allowed(key){return !!user?.rights?.[key]}
function pages(){let p=['Accueil'];if(allowed('quotes'))p.push('Devis');if(allowed('workshop'))p.push('Atelier');if(allowed('orders'))p.push('Commandes');if(allowed('tasks'))p.push('Tâches');if(allowed('direction'))p.push('Direction');return p}
function nav(){document.getElementById('nav').innerHTML=pages().map(p=>`<button class="${p===page?'active':''}" onclick="go('${p}')">${p}</button>`).join('')}
function go(p){page=p;render()}function badge(v){let c=v.includes('valid')||v==='Terminée'?'green':v.includes('Bloqué')?'red':v.includes('attente')||v.includes('confirmer')?'yellow':'purple';return `<span class="badge ${c}">${v}</span>`}
function taskItem(t){return `<div class="item"><div><div class="item-title">${t.done?'✓ ':''}${t.title}</div><div class="muted">${t.domain} • ${t.priority}</div></div><button class="btn small" onclick="toggleTask('${t.id}')">${t.done?'Rouvrir':'Terminer'}</button></div>`}function quoteItem(q){return `<div class="item"><div><div class="item-title">${q.vehicle} — ${q.amount.toLocaleString('fr-FR')} € TTC</div><div class="muted">${q.client} • ${q.offer}</div></div>${badge(q.status)}</div>`}function orderItem(o){return `<div class="item"><div><div class="item-title">${o.label} — ${o.supplier}</div><div class="muted">${o.detail}</div></div>${badge(o.status)}</div>`}
function renderAccueil(){return `<div class="grid"><section class="card span-12 hero"><div><h2>Bonjour ${user.name}.</h2><p class="muted">Bienvenue dans Jarvis GentleCarE.</p></div><button class="btn primary" onclick="go('Devis')">🎤 Nouveau devis vocal</button></section><section class="card span-12"><div class="stats"><div class="stat" onclick="go('Tâches')"><span class="muted">Tâches</span><strong>${state.tasks.filter(t=>!t.done).length}</strong></div><div class="stat" onclick="go('Devis')"><span class="muted">Devis</span><strong>${state.quotes.length}</strong></div><div class="stat" onclick="go('Commandes')"><span class="muted">Commandes</span><strong>${state.orders.length}</strong></div><div class="stat" onclick="go('Atelier')"><span class="muted">Interventions</span><strong>${state.interventions.length}</strong></div></div></section></div>`}
function renderDevis(){return `<div class="grid"><section class="card span-12"><div class="section-title"><h3>Devis</h3><button class="btn primary" onclick="alert('Collecte vocale du nouveau devis : prochaine connexion Airtable.')">🎤 Nouveau devis vocal</button></div><div class="list">${state.quotes.map(quoteItem).join('')}</div></section></div>`}
function renderAtelier(){return `<div class="grid"><section class="card span-12"><div class="section-title"><h3>Planning atelier — semaine</h3><a class="btn primary" href="employe.html">Ouvrir le mode employé</a></div><div class="list">${state.interventions.map(i=>`<div class="item"><div><div class="item-title">${i.vehicle}</div><div class="muted">${i.client} • ${new Date(i.date).toLocaleDateString('fr-FR')}</div></div>${badge(i.status)}</div>`).join('')}</div></section></div>`}
function renderCommandes(){return `<div class="grid"><section class="card span-12"><h3>Commandes</h3><div class="list">${state.orders.map(orderItem).join('')}</div></section></div>`}
function renderTasks(){return `<div class="grid"><section class="card span-12"><div class="section-title"><h3>Tâches</h3><button class="btn primary" onclick="openTaskModal()">Ajouter</button></div><div class="list">${state.tasks.map(taskItem).join('')}</div></section></div>`}
function renderDirection(){return `<div class="grid"><section class="card span-6"><h3>Planning direction — 15 jours</h3><div class="list">${state.interventions.map(i=>`<div class="item"><div><strong>${i.vehicle}</strong><div class="muted">${new Date(i.date).toLocaleDateString('fr-FR')} • ${i.client}</div></div>${badge(i.status)}</div>`).join('')}</div></section><section class="card span-6"><div class="section-title"><h3>Utilisateurs et droits</h3><button class="btn primary small" onclick="openUserModal()">Créer un employé</button></div><div class="list">${accounts.map(a=>`<div class="item"><div><strong>${a.name}</strong><div class="muted">${a.role==='direction'?'Direction':'Employé'} • ${a.pin?'Code configuré':'Code à créer'}</div></div>${a.role==='employee'?`<button class="btn small" onclick="editRights('${a.id}')">Droits</button>`:''}</div>`).join('')}</div></section></div>`}
function render(){nav();let map={Accueil:renderAccueil,Devis:renderDevis,Atelier:renderAtelier,Commandes:renderCommandes,Tâches:renderTasks,Direction:renderDirection};document.getElementById('content').innerHTML=(map[page]||renderAccueil)()}
function toggleTask(id){let t=state.tasks.find(x=>x.id===id);t.done=!t.done;log(`Tâche ${t.done?'terminée':'rouverte'} : ${t.title}`);render()}
function openTaskModal(){document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><h3>Nouvelle tâche</h3><input id="taskTitle" class="search" placeholder="Intitulé"><button class="btn primary" style="width:100%;margin-top:12px" onclick="addTask()">Créer</button><button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">Annuler</button></div></div>`}function addTask(){let title=document.getElementById('taskTitle').value.trim();if(!title)return;state.tasks.unshift({id:crypto.randomUUID(),title,domain:'Direction',priority:'Normale',done:false});log(`Tâche créée : ${title}`);closeModal();render()}function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function openUserModal(){let employees=accounts.filter(a=>a.role==='employee');if(employees.length>=10)return alert('La limite de 10 employés est atteinte.');document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><h3>Créer un compte employé</h3><input id="employeeName" class="search" placeholder="Prénom de l’employé"><p class="muted">Son code personnel sera créé lors de sa première connexion.</p><div class="rights"><label class="right"><input type="checkbox" id="rTasks" checked> Tâches</label><label class="right"><input type="checkbox" id="rWorkshop" checked> Atelier</label><label class="right"><input type="checkbox" id="rQuotes"> Devis</label><label class="right"><input type="checkbox" id="rOrders"> Commandes</label></div><button class="btn primary" style="width:100%" onclick="createEmployee()">Créer le compte</button><button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">Annuler</button></div></div>`}
function createEmployee(){let name=document.getElementById('employeeName').value.trim();if(!name)return alert('Indiquez un prénom.');if(accounts.some(a=>a.name.toLowerCase()===name.toLowerCase()))return alert('Ce prénom existe déjà.');accounts.push({id:'emp-'+crypto.randomUUID(),name,role:'employee',pin:null,rights:{tasks:document.getElementById('rTasks').checked,workshop:document.getElementById('rWorkshop').checked,quotes:document.getElementById('rQuotes').checked,orders:document.getElementById('rOrders').checked,direction:false,users:false}});saveAccounts();log(`Compte employé créé : ${name}`);closeModal();render()}
function editRights(id){let a=accounts.find(x=>x.id===id);document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><h3>Droits de ${a.name}</h3><div class="rights"><label class="right"><input type="checkbox" id="erTasks" ${a.rights.tasks?'checked':''}> Tâches</label><label class="right"><input type="checkbox" id="erWorkshop" ${a.rights.workshop?'checked':''}> Atelier</label><label class="right"><input type="checkbox" id="erQuotes" ${a.rights.quotes?'checked':''}> Devis</label><label class="right"><input type="checkbox" id="erOrders" ${a.rights.orders?'checked':''}> Commandes</label></div><button class="btn primary" style="width:100%" onclick="saveRights('${id}')">Enregistrer</button><button class="btn danger" style="width:100%;margin-top:8px" onclick="deleteEmployee('${id}')">Supprimer le compte</button><button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">Annuler</button></div></div>`}
function saveRights(id){let a=accounts.find(x=>x.id===id);a.rights.tasks=document.getElementById('erTasks').checked;a.rights.workshop=document.getElementById('erWorkshop').checked;a.rights.quotes=document.getElementById('erQuotes').checked;a.rights.orders=document.getElementById('erOrders').checked;saveAccounts();log(`Droits modifiés : ${a.name}`);closeModal();render()}function deleteEmployee(id){let a=accounts.find(x=>x.id===id);if(!confirm(`Supprimer le compte de ${a.name} ?`))return;accounts=accounts.filter(x=>x.id!==id);saveAccounts();log(`Compte supprimé : ${a.name}`);closeModal();render()}
function jarvis(){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return alert('La reconnaissance vocale n’est pas disponible sur cet appareil.');let r=new SR();r.lang='fr-FR';r.onresult=e=>{let q=e.results[0][0].transcript.toLowerCase();if(q.includes('devis'))go('Devis');else if(q.includes('atelier'))go('Atelier');else if(q.includes('commande'))go('Commandes');else if(q.includes('tâche'))go('Tâches')};r.start()}
function boot(){document.getElementById('loginRoot').innerHTML='';document.getElementById('app').hidden=false;document.getElementById('currentUser').textContent=user.name;document.getElementById('today').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});document.getElementById('jarvisBtn').onclick=jarvis;render()}
if(session){user=accounts.find(a=>a.id===session.id);if(user){if(user.role==='employee')location.href='employe.html';else boot()}else startLogin()}else startLogin();
</script></body></html>
