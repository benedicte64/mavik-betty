<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111318">
<link rel="manifest" href="manifest.webmanifest"><title>GCOS — GentleCarE</title>
<style>
:root{--bg:#0d0f13;--panel:#171a21;--panel2:#20242d;--text:#f7f7f8;--muted:#a9afbd;--yellow:#ffd400;--purple:#8b5cf6;--green:#22c55e;--red:#ef4444;--border:#303641}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,#0b0d11,#12151b);color:var(--text);min-height:100vh}button,input,select,textarea{font:inherit}.app{max-width:1280px;margin:auto;padding:18px}.topbar{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:var(--yellow);color:#111;display:grid;place-items:center;font-weight:900}.brand h1{margin:0;font-size:1.25rem}.muted{color:var(--muted)}.nav{display:flex;gap:8px;overflow:auto;padding-bottom:6px}.nav button,.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:12px;padding:10px 14px;cursor:pointer}.nav button.active{background:var(--yellow);color:#111;border-color:var(--yellow);font-weight:800}.jarvis{background:linear-gradient(135deg,#6d28d9,#9f67ff);border:0;font-weight:800}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(23,26,33,.95);border:1px solid var(--border);border-radius:18px;padding:16px}.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-6{grid-column:span 6}.span-4{grid-column:span 4}.hero{display:flex;justify-content:space-between;gap:16px;align-items:center}.hero h2{font-size:clamp(1.7rem,4vw,3rem);margin:0 0 8px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:var(--panel2);padding:14px;border-radius:14px}.stat strong{display:block;font-size:1.55rem}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.section-title h3{margin:0}.list{display:flex;flex-direction:column;gap:10px}.item{background:var(--panel2);border-radius:14px;padding:13px;display:flex;gap:12px;justify-content:space-between;align-items:center}.item-title{font-weight:800}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:.78rem;font-weight:800;background:#343945}.badge.green{background:#123e23;color:#76ef9d}.badge.red{background:#4b1717;color:#ff9393}.badge.yellow{background:#5b4d00;color:#ffe45c}.badge.purple{background:#34205a;color:#cdb2ff}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn.primary{background:var(--yellow);color:#111;border-color:var(--yellow);font-weight:900}.btn.success{background:#14532d;border-color:#166534}.btn.danger{background:#5f1d1d;border-color:#7f1d1d}.btn.small{padding:7px 10px;font-size:.85rem}.search,textarea,select{width:100%;border:1px solid var(--border);background:#101319;color:var(--text);border-radius:12px;padding:12px}.checkrow{display:flex;gap:10px;align-items:center;padding:12px;background:var(--panel2);border-radius:12px}.checkrow input{width:22px;height:22px}.timer{font-variant-numeric:tabular-nums;font-size:2.6rem;font-weight:900}.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px}.journal{max-height:420px;overflow:auto}.footer{padding:28px 0;color:var(--muted);text-align:center}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:grid;place-items:center;padding:18px;z-index:20}.modal-card{width:min(680px,100%);background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px}.login{position:fixed;inset:0;background:#0d0f13;display:grid;place-items:center;padding:20px;z-index:50}.login-card{width:min(520px,100%);background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:24px;text-align:center}.profiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}.profile{padding:22px 12px;border:1px solid var(--border);background:var(--panel2);border-radius:16px;color:var(--text);font-weight:800}.userchip{display:flex;align-items:center;gap:8px}.dot{width:10px;height:10px;border-radius:50%;background:var(--green)}@media(max-width:900px){.span-8,.span-6,.span-4{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}.hero,.topbar{align-items:flex-start;flex-direction:column}.nav{width:100%}}@media(max-width:560px){.app{padding:12px}.item{align-items:flex-start;flex-direction:column}.actions{width:100%}.actions .btn{flex:1}.profiles{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loginRoot"></div>
<div class="app"><header class="topbar"><div class="brand"><div class="logo">GC</div><div><h1>GCOS — GentleCarE</h1><div class="muted" id="today"></div></div></div><div class="actions"><div class="userchip"><span class="dot"></span><strong id="currentUser"></strong></div><button class="btn small" onclick="logout()">Changer</button><button class="btn jarvis" id="jarvisBtn">🎤 Parler à Jarvis</button></div></header><nav class="nav" id="nav"></nav><main id="content"></main><div class="footer">GCOS MVP • données enregistrées localement sur cet appareil</div></div><div id="modalRoot"></div>
<script>
const seed={tasks:[{id:'t1',title:'Vérifier activation du compte LDLC Pro',domain:'Commercial',priority:'Haute',done:false},{id:'t2',title:'Appeler MMA pour finaliser l’assurance',domain:'Direction',priority:'Haute',done:false},{id:'t3',title:'Relancer VisioPlus',domain:'Fournisseurs',priority:'Normale',done:false},{id:'t4',title:'Relancer Gelaquitaine',domain:'Fournisseurs',priority:'Normale',done:false}],quotes:[{id:'q1',client:'Client Club Mustang',vehicle:'Audi S5 V8',amount:1050,status:'À valider',offer:'Pass Fondateur –30 %'}],orders:[{id:'o1',supplier:'Intelblast',label:'Machine cryogénique',amount:9900,status:'À confirmer',detail:'Acompte 2 376 € TTC • livraison fin août/début septembre'},{id:'o2',supplier:'France Air',label:'Compresseur',amount:500,status:'Bloqué technique',detail:'Validation électrique 24 kW / variateur'},{id:'o3',supplier:'Dinitrol',label:'Première commande',amount:1200,status:'En attente',detail:'Montant HT'}],interventions:[{id:'i1',client:'Béné',vehicle:'Mini blanche 2005',status:'Préparation',notes:'Corrosion : dessous, moteur et passages de roues',seconds:0,running:false,startedAt:null,checks:[['Photos avant',false],['Contrôle initial',false],['Cryonettoyage dessous',false],['Cryonettoyage moteur',false],['Passages de roues',false],['Protection Dinitrol',false],['Photos après',false],['Rapport client',false]],photos:[]}],journal:[{id:crypto.randomUUID(),at:new Date().toISOString(),text:'GCOS initialisé'}]};
let state=JSON.parse(localStorage.getItem('gcos-state')||'null')||structuredClone(seed),page='Accueil',timerHandle=null,user=localStorage.getItem('gcos-user');const pages=['Accueil','Commercial','Atelier','Fournisseurs','Direction'];
function save(){localStorage.setItem('gcos-state',JSON.stringify(state))}function log(text){state.journal.unshift({id:crypto.randomUUID(),at:new Date().toISOString(),text:`${user||'Utilisateur'} — ${text}`});save()}
function chooseUser(name){user=name;localStorage.setItem('gcos-user',name);document.getElementById('loginRoot').innerHTML='';boot()}function logout(){localStorage.removeItem('gcos-user');location.reload()}function login(){if(user)return;document.getElementById('loginRoot').innerHTML=`<div class="login"><div class="login-card"><div class="logo" style="margin:auto">GC</div><h2>Bienvenue dans GCOS</h2><p class="muted">Choisissez votre profil pour ouvrir Jarvis.</p><div class="profiles"><button class="profile" onclick="chooseUser('David')">👤 David<br><span class="muted">Direction</span></button><button class="profile" onclick="chooseUser('Bénédicte')">👤 Bénédicte<br><span class="muted">Associée</span></button></div></div></div>`}
function nav(){document.getElementById('nav').innerHTML=pages.map(p=>`<button class="${p===page?'active':''}" onclick="go('${p}')">${p}</button>`).join('')+`<button onclick="openSearch()">⌕ Recherche</button>`}function go(p){page=p;render()}function badge(v){let c=v.includes('valid')||v==='Terminée'?'green':v.includes('Bloqué')?'red':v.includes('attente')||v.includes('confirmer')?'yellow':'purple';return `<span class="badge ${c}">${v}</span>`}
function taskItem(t){return `<div class="item"><div><div class="item-title">${t.done?'✓ ':''}${t.title}</div><div class="muted">${t.domain} • ${t.priority}</div></div><div class="actions"><button class="btn small ${t.done?'':'success'}" onclick="toggleTask('${t.id}')">${t.done?'Rouvrir':'Terminer'}</button></div></div>`}function quoteItem(q){return `<div class="item"><div><div class="item-title">${q.vehicle} — ${q.amount.toLocaleString('fr-FR')} € TTC</div><div class="muted">${q.client} • ${q.offer}</div></div><div class="actions">${badge(q.status)}<button class="btn small primary" onclick="quoteAction('${q.id}','Validé')">Valider</button></div></div>`}function orderItem(o){return `<div class="item"><div><div class="item-title">${o.label} — ${o.supplier}</div><div class="muted">${o.detail}</div></div><div class="actions">${badge(o.status)}<button class="btn small" onclick="cycleOrder('${o.id}')">Changer statut</button></div></div>`}
function renderAccueil(){let open=state.tasks.filter(t=>!t.done).length;return `<div class="grid"><section class="card span-12 hero"><div><h2>Bonjour ${user}.</h2><p class="muted">Voici les priorités opérationnelles de GentleCarE.</p></div><button class="btn primary" onclick="openTaskModal()">＋ Nouvelle tâche</button></section><section class="card span-12"><div class="stats"><div class="stat"><span class="muted">Tâches ouvertes</span><strong>${open}</strong></div><div class="stat"><span class="muted">Devis à valider</span><strong>${state.quotes.filter(q=>q.status==='À valider').length}</strong></div><div class="stat"><span class="muted">Commandes</span><strong>${state.orders.length}</strong></div><div class="stat"><span class="muted">Interventions</span><strong>${state.interventions.length}</strong></div></div></section><section class="card span-6"><div class="section-title"><h3>Tâches prioritaires</h3></div><div class="list">${state.tasks.filter(t=>!t.done).map(taskItem).join('')}</div></section><section class="card span-6"><div class="section-title"><h3>Devis à valider</h3></div><div class="list">${state.quotes.map(quoteItem).join('')}</div></section><section class="card span-6"><h3>Commandes fournisseurs</h3><div class="list">${state.orders.map(orderItem).join('')}</div></section><section class="card span-6"><h3>Intervention</h3><div class="item"><div><div class="item-title">${state.interventions[0].vehicle}</div><div class="muted">${state.interventions[0].client} • ${state.interventions[0].notes}</div></div>${badge(state.interventions[0].status)}</div></section></div>`}
function renderCommercial(){return `<div class="grid"><section class="card span-12"><div class="section-title"><h3>Commercial</h3></div><div class="list">${state.quotes.map(quoteItem).join('')}</div></section></div>`}function renderFournisseurs(){return `<div class="grid"><section class="card span-12"><h3>Fournisseurs et commandes</h3><div class="list">${state.orders.map(orderItem).join('')}</div></section></div>`}
function renderDirection(){return `<div class="grid"><section class="card span-6"><div class="section-title"><h3>Tâches</h3><button class="btn small primary" onclick="openTaskModal()">Ajouter</button></div><div class="list">${state.tasks.map(taskItem).join('')}</div></section><section class="card span-6"><div class="section-title"><h3>Journal d’activité</h3><button class="btn small danger" onclick="resetData()">Réinitialiser</button></div><div class="list journal">${state.journal.map(j=>`<div class="item"><div>${j.text}<div class="muted">${new Date(j.at).toLocaleString('fr-FR')}</div></div></div>`).join('')}</div></section></div>`}
function renderAtelier(){let i=state.interventions[0],elapsed=i.seconds+(i.running?Math.floor((Date.now()-i.startedAt)/1000):0),done=i.checks.filter(c=>c[1]).length;return `<div class="grid"><section class="card span-12"><div class="section-title"><div><h3>${i.vehicle}</h3><div class="muted">${i.client} • ${i.notes}</div></div>${badge(i.status)}</div><div class="stats"><div class="stat"><span class="muted">Progression</span><strong>${Math.round(done/i.checks.length*100)}%</strong></div><div class="stat"><span class="muted">Étapes</span><strong>${done}/${i.checks.length}</strong></div><div class="stat" style="grid-column:span 2"><span class="muted">Chronomètre</span><div class="timer" id="timer">${fmt(elapsed)}</div></div></div><div class="actions" style="margin-top:14px"><button class="btn primary" onclick="timerAction('${i.running?'pause':'start'}')">${i.running?'Pause':'Démarrer'}</button><button class="btn" onclick="timerAction('finish')">Terminer</button></div></section><section class="card span-8"><h3>Checklist Atelier</h3><div class="list">${i.checks.map((c,idx)=>`<label class="checkrow"><input type="checkbox" ${c[1]?'checked':''} onchange="toggleCheck(${idx})"><strong>${c[0]}</strong></label>`).join('')}</div></section><section class="card span-4"><h3>Photos et notes</h3><label class="btn primary" style="display:block;text-align:center;margin-bottom:12px">📷 Ajouter<input type="file" accept="image/*" capture="environment" multiple hidden onchange="addPhotos(this.files)"></label><textarea onblur="saveNotes(this.value)">${i.notes||''}</textarea><div class="photo-grid" style="margin-top:12px">${i.photos.map(p=>`<img src="${p}">`).join('')}</div></section></div>`}
function render(){nav();document.getElementById('content').innerHTML=page==='Accueil'?renderAccueil():page==='Commercial'?renderCommercial():page==='Atelier'?renderAtelier():page==='Fournisseurs'?renderFournisseurs():renderDirection();if(page==='Atelier')syncTimer()}
function toggleTask(id){let t=state.tasks.find(x=>x.id===id);t.done=!t.done;log(`${t.done?'Tâche terminée':'Tâche rouverte'} : ${t.title}`);render()}function quoteAction(id,status){let q=state.quotes.find(x=>x.id===id);q.status=status;log(`Devis ${q.vehicle} : ${status}`);render()}function cycleOrder(id){let o=state.orders.find(x=>x.id===id),v=['En attente','À confirmer','Commandée','Reçue','Bloqué technique'];o.status=v[(v.indexOf(o.status)+1)%v.length];log(`Commande ${o.label} : ${o.status}`);render()}function toggleCheck(idx){let i=state.interventions[0];i.checks[idx][1]=!i.checks[idx][1];log(`Atelier ${i.vehicle} : ${i.checks[idx][0]}`);render()}
function timerAction(a){let i=state.interventions[0];if(a==='start'&&!i.running){i.running=true;i.startedAt=Date.now();i.status='En cours'}else if(a==='pause'&&i.running){i.seconds+=Math.floor((Date.now()-i.startedAt)/1000);i.running=false;i.startedAt=null}else if(a==='finish'){if(i.running)i.seconds+=Math.floor((Date.now()-i.startedAt)/1000);i.running=false;i.startedAt=null;i.status='Terminée'}log(`Intervention ${i.vehicle} : ${i.status}`);render()}function syncTimer(){clearInterval(timerHandle);timerHandle=setInterval(()=>{let i=state.interventions[0],el=document.getElementById('timer');if(el)el.textContent=fmt(i.seconds+(i.running?Math.floor((Date.now()-i.startedAt)/1000):0))},1000)}function fmt(s){return [Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(n=>String(n).padStart(2,'0')).join(':')}
function addPhotos(files){let i=state.interventions[0];[...files].slice(0,6).forEach(f=>{let r=new FileReader();r.onload=()=>{i.photos.push(r.result);save();render()};r.readAsDataURL(f)});log(`${files.length} photo(s) ajoutée(s)`)}function saveNotes(v){state.interventions[0].notes=v;log('Notes atelier mises à jour')}
function openTaskModal(){document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><div class="section-title"><h3>Nouvelle tâche</h3><button class="btn small" onclick="closeModal()">Fermer</button></div><input id="taskTitle" class="search" placeholder="Intitulé"><select id="taskDomain" style="margin-top:10px"><option>Direction</option><option>Commercial</option><option>Fournisseurs</option><option>Atelier</option></select><select id="taskPriority" style="margin-top:10px"><option>Normale</option><option>Haute</option></select><button class="btn primary" style="margin-top:12px;width:100%" onclick="addTask()">Créer la tâche</button></div></div>`}function addTask(){let title=document.getElementById('taskTitle').value.trim();if(!title)return;state.tasks.unshift({id:crypto.randomUUID(),title,domain:document.getElementById('taskDomain').value,priority:document.getElementById('taskPriority').value,done:false});log(`Tâche créée : ${title}`);closeModal();render()}function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function openSearch(){let q=prompt('Recherche globale :');if(!q)return;let pool=[...state.tasks.map(x=>`Tâche : ${x.title}`),...state.quotes.map(x=>`Devis : ${x.vehicle} ${x.client}`),...state.orders.map(x=>`Commande : ${x.label} ${x.supplier}`)];alert(pool.filter(x=>x.toLowerCase().includes(q.toLowerCase())).join('\n')||'Aucun résultat')}function resetData(){if(confirm('Réinitialiser les données de démonstration ?')){state=structuredClone(seed);log('Données réinitialisées');render()}}
function jarvis(){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){let q=prompt('Que dois-je faire ?');if(q)handleJarvis(q);return}let r=new SR();r.lang='fr-FR';r.onresult=e=>handleJarvis(e.results[0][0].transcript);r.onerror=()=>{let q=prompt('Écris ta demande :');if(q)handleJarvis(q)};r.start()}function handleJarvis(q){let x=q.toLowerCase();if(x.includes('atelier'))go('Atelier');else if(x.includes('fournisseur')||x.includes('commande'))go('Fournisseurs');else if(x.includes('devis')||x.includes('commercial'))go('Commercial');else if(x.includes('tâche')||x.includes('direction'))go('Direction');else openSearch();log(`Commande Jarvis : ${q}`)}
function boot(){document.getElementById('currentUser').textContent=user;document.getElementById('today').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});document.getElementById('jarvisBtn').onclick=jarvis;render()}login();if(user)boot();
</script></body></html>
