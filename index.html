<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111318" />
  <title>GCOS — GentleCarE</title>
  <style>
    :root{--bg:#0d0f13;--panel:#171a21;--panel2:#20242d;--text:#f7f7f8;--muted:#a9afbd;--yellow:#ffd400;--purple:#8b5cf6;--green:#22c55e;--red:#ef4444;--border:#303641}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0b0d11,#12151b);color:var(--text);min-height:100vh}button,input,select,textarea{font:inherit}.app{max-width:1280px;margin:auto;padding:18px}.topbar{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:var(--yellow);color:#111;display:grid;place-items:center;font-weight:900}.brand h1{margin:0;font-size:1.25rem}.muted{color:var(--muted)}.nav{display:flex;gap:8px;overflow:auto;padding-bottom:6px}.nav button,.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:12px;padding:10px 14px;cursor:pointer}.nav button.active{background:var(--yellow);color:#111;border-color:var(--yellow);font-weight:800}.jarvis{background:linear-gradient(135deg,#6d28d9,#9f67ff);border:0;font-weight:800}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:rgba(23,26,33,.95);border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.18)}.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-6{grid-column:span 6}.span-4{grid-column:span 4}.span-3{grid-column:span 3}.hero{display:flex;justify-content:space-between;gap:16px;align-items:center}.hero h2{font-size:clamp(1.7rem,4vw,3rem);margin:0 0 8px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:var(--panel2);padding:14px;border-radius:14px}.stat strong{display:block;font-size:1.55rem}.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.section-title h3{margin:0}.list{display:flex;flex-direction:column;gap:10px}.item{background:var(--panel2);border:1px solid transparent;border-radius:14px;padding:13px;display:flex;gap:12px;justify-content:space-between;align-items:center}.item:hover{border-color:#4a5260}.item-main{min-width:0}.item-title{font-weight:800}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:.78rem;font-weight:800;background:#343945}.badge.yellow{background:#5b4d00;color:#ffe45c}.badge.green{background:#123e23;color:#76ef9d}.badge.red{background:#4b1717;color:#ff9393}.badge.purple{background:#34205a;color:#cdb2ff}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn.primary{background:var(--yellow);color:#111;border-color:var(--yellow);font-weight:900}.btn.success{background:#14532d;border-color:#166534}.btn.danger{background:#5f1d1d;border-color:#7f1d1d}.btn.small{padding:7px 10px;font-size:.85rem}.search{width:100%;border:1px solid var(--border);background:#101319;color:var(--text);border-radius:12px;padding:12px}.hidden{display:none!important}.checkrow{display:flex;gap:10px;align-items:center;padding:12px;background:var(--panel2);border-radius:12px}.checkrow input{width:22px;height:22px}.timer{font-variant-numeric:tabular-nums;font-size:2.6rem;font-weight:900;letter-spacing:.04em}.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px}.journal{max-height:420px;overflow:auto}.journal .item{align-items:flex-start}.footer{padding:28px 0;color:var(--muted);text-align:center}.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:grid;place-items:center;padding:18px;z-index:20}.modal-card{width:min(680px,100%);background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:18px}textarea{width:100%;min-height:100px;background:#101319;color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px}@media(max-width:900px){.span-8,.span-6,.span-4,.span-3{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}.hero{align-items:flex-start;flex-direction:column}.topbar{align-items:flex-start;flex-direction:column}.nav{width:100%}}@media(max-width:560px){.app{padding:12px}.stats{grid-template-columns:1fr 1fr}.item{align-items:flex-start;flex-direction:column}.actions{width:100%}.actions .btn{flex:1}.photo-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="logo">GC</div><div><h1>GCOS — GentleCarE</h1><div class="muted" id="today"></div></div></div>
    <button class="btn jarvis" id="jarvisBtn">🎤 Parler à Jarvis</button>
  </header>
  <nav class="nav" id="nav"></nav>
  <main id="content"></main>
  <div class="footer">GCOS MVP • données sauvegardées localement sur cet appareil</div>
</div>
<div id="modalRoot"></div>
<script>
const seed={tasks:[
{id:'t1',title:'Vérifier activation du compte LDLC Pro',domain:'Commercial',priority:'Haute',done:false},
{id:'t2',title:'Appeler MMA pour finaliser l’assurance',domain:'Direction',priority:'Haute',done:false},
{id:'t3',title:'Relancer VisioPlus',domain:'Fournisseurs',priority:'Normale',done:false},
{id:'t4',title:'Relancer Gelaquitaine',domain:'Fournisseurs',priority:'Normale',done:false}
],quotes:[{id:'q1',client:'Client Club Mustang',vehicle:'Audi S5 V8',amount:1050,status:'À valider',offer:'Pass Fondateur –30 %'}],orders:[
{id:'o1',supplier:'Intelblast',label:'Machine cryogénique',amount:9900,status:'À confirmer',detail:'Acompte 2 376 € TTC • livraison fin août/début septembre'},
{id:'o2',supplier:'France Air',label:'Compresseur',amount:500,status:'Bloqué technique',detail:'Validation électrique 24 kW / variateur'},
{id:'o3',supplier:'Dinitrol',label:'Première commande',amount:1200,status:'En attente',detail:'Montant HT'}
],interventions:[{id:'i1',client:'Béné',vehicle:'Mini blanche 2005',status:'Préparation',notes:'Corrosion : dessous, moteur et passages de roues',seconds:0,running:false,startedAt:null,checks:[['Photos avant',false],['Contrôle initial',false],['Cryonettoyage dessous',false],['Cryonettoyage moteur',false],['Passages de roues',false],['Protection Dinitrol',false],['Photos après',false],['Rapport client',false]],photos:[]}],journal:[{id:crypto.randomUUID(),at:new Date().toISOString(),text:'GCOS initialisé'}]};
let state=JSON.parse(localStorage.getItem('gcos-state')||'null')||structuredClone(seed);let page='Accueil';let timerHandle=null;
const pages=['Accueil','Commercial','Atelier','Fournisseurs','Direction'];
function save(){localStorage.setItem('gcos-state',JSON.stringify(state))}function log(text){state.journal.unshift({id:crypto.randomUUID(),at:new Date().toISOString(),text});save()}
function nav(){document.getElementById('nav').innerHTML=pages.map(p=>`<button class="${p===page?'active':''}" onclick="go('${p}')">${p}</button>`).join('')+`<button onclick="openSearch()">⌕ Recherche</button>`}
function go(p){page=p;nav();render()}function badge(v){let c=v.includes('valid')||v==='Terminée'?'green':v.includes('Bloqué')?'red':v.includes('attente')||v.includes('confirmer')?'yellow':'purple';return `<span class="badge ${c}">${v}</span>`}
function taskItem(t){return `<div class="item"><div class="item-main"><div class="item-title">${t.done?'✓ ':''}${t.title}</div><div class="muted">${t.domain} • ${t.priority}</div></div><div class="actions"><button class="btn small ${t.done?'':'success'}" onclick="toggleTask('${t.id}')">${t.done?'Rouvrir':'Terminer'}</button></div></div>`}
function orderItem(o){return `<div class="item"><div class="item-main"><div class="item-title">${o.label} — ${o.supplier}</div><div class="muted">${o.detail}</div></div><div class="actions">${badge(o.status)}<button class="btn small" onclick="cycleOrder('${o.id}')">Changer statut</button></div></div>`}
function quoteItem(q){return `<div class="item"><div class="item-main"><div class="item-title">${q.vehicle} — ${q.amount.toLocaleString('fr-FR')} € TTC</div><div class="muted">${q.client} • ${q.offer}</div></div><div class="actions">${badge(q.status)}<button class="btn small primary" onclick="quoteAction('${q.id}','Validé')">Valider</button><button class="btn small" onclick="quoteAction('${q.id}','À corriger')">Corriger</button></div></div>`}
function renderAccueil(){let open=state.tasks.filter(t=>!t.done).length;return `<div class="grid"><section class="card span-12 hero"><div><h2>Bonjour David.</h2><p class="muted">Voici les priorités opérationnelles de GentleCarE.</p></div><button class="btn primary" onclick="go('Atelier')">Ouvrir le mode Atelier</button></section><section class="card span-12"><div class="stats"><div class="stat"><span class="muted">Tâches ouvertes</span><strong>${open}</strong></div><div class="stat"><span class="muted">Devis à valider</span><strong>${state.quotes.filter(q=>q.status==='À valider').length}</strong></div><div class="stat"><span class="muted">Commandes</span><strong>${state.orders.length}</strong></div><div class="stat"><span class="muted">Interventions</span><strong>${state.interventions.length}</strong></div></div></section><section class="card span-6"><div class="section-title"><h3>Tâches prioritaires</h3><button class="btn small" onclick="go('Direction')">Tout voir</button></div><div class="list">${state.tasks.filter(t=>!t.done).slice(0,4).map(taskItem).join('')}</div></section><section class="card span-6"><div class="section-title"><h3>Devis à valider</h3></div><div class="list">${state.quotes.map(quoteItem).join('')}</div></section><section class="card span-6"><div class="section-title"><h3>Commandes fournisseurs</h3></div><div class="list">${state.orders.map(orderItem).join('')}</div></section><section class="card span-6"><div class="section-title"><h3>Intervention en préparation</h3></div>${interventionSummary(state.interventions[0])}</section></div>`}
function interventionSummary(i){let done=i.checks.filter(c=>c[1]).length;return `<div class="item"><div><div class="item-title">${i.vehicle}</div><div class="muted">${i.client} • ${i.notes}</div><div style="margin-top:8px">${badge(i.status)} <span class="muted">${done}/${i.checks.length} étapes</span></div></div></div>`}
function renderCommercial(){return `<div class="grid"><section class="card span-12"><div class="section-title"><h3>Commercial</h3></div><input class="search" placeholder="Filtrer les devis" oninput="filterList(this.value,'quoteList')"><div class="list" id="quoteList" style="margin-top:12px">${state.quotes.map(quoteItem).join('')}</div></section></div>`}
function renderFournisseurs(){return `<div class="grid"><section class="card span-12"><div class="section-title"><h3>Fournisseurs et commandes</h3></div><div class="list">${state.orders.map(orderItem).join('')}</div></section></div>`}
function renderDirection(){return `<div class="grid"><section class="card span-6"><div class="section-title"><h3>Tâches</h3><select onchange="filterTasks(this.value)"><option value="all">Toutes</option><option value="open">Ouvertes</option><option value="done">Terminées</option></select></div><div class="list" id="taskList">${state.tasks.map(taskItem).join('')}</div></section><section class="card span-6"><div class="section-title"><h3>Journal d’activité</h3><button class="btn small danger" onclick="resetData()">Réinitialiser les données test</button></div><div class="list journal">${state.journal.map(j=>`<div class="item"><div><div>${j.text}</div><div class="muted">${new Date(j.at).toLocaleString('fr-FR')}</div></div></div>`).join('')}</div></section></div>`}
function renderAtelier(){let i=state.interventions[0],elapsed=i.seconds+(i.running?Math.floor((Date.now()-i.startedAt)/1000):0),done=i.checks.filter(c=>c[1]).length,pct=Math.round(done/i.checks.length*100);return `<div class="grid"><section class="card span-12"><div class="section-title"><div><h3>${i.vehicle}</h3><div class="muted">${i.client} • ${i.notes}</div></div>${badge(i.status)}</div><div class="stats"><div class="stat"><span class="muted">Progression</span><strong>${pct}%</strong></div><div class="stat"><span class="muted">Étapes</span><strong>${done}/${i.checks.length}</strong></div><div class="stat" style="grid-column:span 2"><span class="muted">Chronomètre</span><div class="timer" id="timer">${fmt(elapsed)}</div></div></div><div class="actions" style="margin-top:14px"><button class="btn primary" onclick="timerAction('${i.running?'pause':'start'}')">${i.running?'Pause':'Démarrer'}</button><button class="btn" onclick="timerAction('finish')">Terminer l’intervention</button></div></section><section class="card span-8"><h3>Checklist Atelier</h3><div class="list">${i.checks.map((c,idx)=>`<label class="checkrow"><input type="checkbox" ${c[1]?'checked':''} onchange="toggleCheck(${idx})"><strong>${c[0]}</strong></label>`).join('')}</div></section><section class="card span-4"><h3>Photos et notes</h3><label class="btn primary" style="display:block;text-align:center;margin-bottom:12px">📷 Ajouter des photos<input type="file" accept="image/*" capture="environment" multiple hidden onchange="addPhotos(this.files)"></label><textarea placeholder="Notes atelier" onblur="saveNotes(this.value)">${i.notes||''}</textarea><div class="photo-grid" style="margin-top:12px">${i.photos.map(p=>`<img src="${p}" alt="Photo intervention">`).join('')}</div></section></div>`}
function render(){nav();let c=document.getElementById('content');c.innerHTML=page==='Accueil'?renderAccueil():page==='Commercial'?renderCommercial():page==='Atelier'?renderAtelier():page==='Fournisseurs'?renderFournisseurs():renderDirection();if(page==='Atelier')syncTimer()}
function toggleTask(id){let t=state.tasks.find(x=>x.id===id);t.done=!t.done;log(`${t.done?'Tâche terminée':'Tâche rouverte'} : ${t.title}`);render()}
function quoteAction(id,status){let q=state.quotes.find(x=>x.id===id);q.status=status;log(`Devis ${q.vehicle} : ${status}`);render()}
function cycleOrder(id){let o=state.orders.find(x=>x.id===id),vals=['En attente','À confirmer','Commandée','Reçue','Bloqué technique'];o.status=vals[(vals.indexOf(o.status)+1)%vals.length];log(`Commande ${o.label} : ${o.status}`);render()}
function toggleCheck(idx){let i=state.interventions[0];i.checks[idx][1]=!i.checks[idx][1];log(`Atelier ${i.vehicle} : ${i.checks[idx][0]} ${i.checks[idx][1]?'validé':'rouvert'}`);render()}
function timerAction(action){let i=state.interventions[0];if(action==='start'&&!i.running){i.running=true;i.startedAt=Date.now();i.status='En cours';log(`Intervention démarrée : ${i.vehicle}`)}else if(action==='pause'&&i.running){i.seconds+=Math.floor((Date.now()-i.startedAt)/1000);i.running=false;i.startedAt=null;log(`Intervention mise en pause : ${i.vehicle}`)}else if(action==='finish'){if(i.running)i.seconds+=Math.floor((Date.now()-i.startedAt)/1000);i.running=false;i.startedAt=null;i.status='Terminée';log(`Intervention terminée : ${i.vehicle}`)}save();render()}
function syncTimer(){clearInterval(timerHandle);timerHandle=setInterval(()=>{if(page!=='Atelier')return;let i=state.interventions[0],e=i.seconds+(i.running?Math.floor((Date.now()-i.startedAt)/1000):0),el=document.getElementById('timer');if(el)el.textContent=fmt(e)},1000)}function fmt(s){let h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=s%60;return [h,m,ss].map(n=>String(n).padStart(2,'0')).join(':')}
function addPhotos(files){let i=state.interventions[0];[...files].slice(0,6).forEach(f=>{let r=new FileReader();r.onload=()=>{i.photos.push(r.result);save();render()};r.readAsDataURL(f)});log(`${files.length} photo(s) ajoutée(s) à ${i.vehicle}`)}function saveNotes(v){state.interventions[0].notes=v;log('Notes atelier mises à jour');render()}
function filterTasks(v){let xs=state.tasks.filter(t=>v==='all'||(v==='open'&&!t.done)||(v==='done'&&t.done));document.getElementById('taskList').innerHTML=xs.map(taskItem).join('')}function filterList(v,id){[...document.getElementById(id).children].forEach(el=>el.style.display=el.innerText.toLowerCase().includes(v.toLowerCase())?'':'none')}
function openSearch(){document.getElementById('modalRoot').innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="modal-card"><div class="section-title"><h3>Recherche globale</h3><button class="btn small" onclick="closeModal()">Fermer</button></div><input class="search" autofocus placeholder="Client, véhicule, fournisseur, tâche…" oninput="globalSearch(this.value)"><div id="searchResults" class="list" style="margin-top:12px"></div></div></div>`}function closeModal(){document.getElementById('modalRoot').innerHTML=''}function globalSearch(q){if(!q){document.getElementById('searchResults').innerHTML='';return}let pool=[...state.tasks.map(x=>({t:'Tâche',s:x.title})),...state.quotes.map(x=>({t:'Devis',s:`${x.vehicle} ${x.client}`})),...state.orders.map(x=>({t:'Commande',s:`${x.label} ${x.supplier}`})),...state.interventions.map(x=>({t:'Intervention',s:`${x.vehicle} ${x.client}`}))];document.getElementById('searchResults').innerHTML=pool.filter(x=>x.s.toLowerCase().includes(q.toLowerCase())).map(x=>`<div class="item"><div><b>${x.t}</b><div class="muted">${x.s}</div></div></div>`).join('')||'<div class="muted">Aucun résultat</div>'}
function resetData(){if(confirm('Réinitialiser toutes les données de démonstration ?')){state=structuredClone(seed);log('Données de démonstration réinitialisées');render()}}
function jarvis(){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){let q=prompt('Que dois-je faire ?');if(q)handleJarvis(q);return}let r=new SR();r.lang='fr-FR';r.interimResults=false;r.onresult=e=>handleJarvis(e.results[0][0].transcript);r.onerror=()=>{let q=prompt('Saisie vocale indisponible. Écris ta demande :');if(q)handleJarvis(q)};r.start()}
function handleJarvis(q){let x=q.toLowerCase();if(x.includes('atelier'))go('Atelier');else if(x.includes('fournisseur')||x.includes('commande'))go('Fournisseurs');else if(x.includes('devis')||x.includes('commercial'))go('Commercial');else if(x.includes('tâche')||x.includes('direction'))go('Direction');else{openSearch();let input=document.querySelector('.modal input');input.value=q;globalSearch(q)}log(`Commande Jarvis : ${q}`)}
document.getElementById('jarvisBtn').onclick=jarvis;document.getElementById('today').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});render();
</script>
</body>
</html>
