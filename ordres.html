<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>GCOS — Ordres atelier</title><meta name="theme-color" content="#07131a"><style>:root{--line:#24424d;--txt:#f4fbfd;--muted:#87a1aa;--green:#79d45d;--amber:#f0b54a;--red:#ef6363;--cyan:#57d7ef}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#071318,#04090c);color:var(--txt);font-family:Inter,system-ui,sans-serif;min-height:100vh}.top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(5,15,19,.94);border-bottom:1px solid var(--line)}.wrap{max-width:1500px;margin:auto;padding:18px}.hero,.card,.order{border:1px solid var(--line);background:linear-gradient(180deg,#0d2028,#09171d);border-radius:18px}.hero{padding:20px;display:flex;justify-content:space-between;gap:12px;align-items:end}.hero h1{margin:0 0 5px}.muted{color:var(--muted)}.btn{border:1px solid var(--line);background:#10242c;color:var(--txt);border-radius:10px;padding:10px 13px;cursor:pointer;text-decoration:none}.btn.primary{background:#275f40;border-color:#438d60;font-weight:800}.btn.warn{background:#4a3517}.btn.danger{background:#4a2020}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.card{padding:15px}.stat strong{display:block;font-size:1.7rem;margin-top:6px}.layout{display:grid;grid-template-columns:1fr 1.15fr;gap:14px;margin-top:14px}.filters{display:grid;grid-template-columns:1fr 180px;gap:8px;margin-bottom:10px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#07151b;color:var(--txt);padding:10px}.list{display:grid;gap:9px}.order{padding:13px;cursor:pointer}.order:hover{border-color:var(--cyan)}.order.active{border-color:var(--green)}.head{display:flex;justify-content:space-between;gap:10px}.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#313743;color:#d7e2eb;font-size:.72rem}.badge.progress{background:#183954;color:#a9dcff}.badge.done{background:#173d2c;color:#9df0b7}.badge.blocked{background:#4a2020;color:#ffb2b2}.row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field{display:grid;gap:5px;margin-bottom:10px}label{font-size:.8rem;color:var(--muted)}.checklist{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.check{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:10px;background:#0a1a21}.check input{width:auto}.actions{display:flex;gap:8px;flex-wrap:wrap}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.summary div{padding:10px;border:1px solid var(--line);border-radius:10px;background:#08161c}.summary strong{display:block;margin-top:4px}.empty{padding:24px;text-align:center;color:var(--muted)}@media(max-width:900px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.row,.checklist{grid-template-columns:1fr}.filters{grid-template-columns:1fr}.wrap{padding:10px 10px 80px}.hero{align-items:flex-start}.summary{grid-template-columns:1fr}}</style></head><body><header class="top"><strong>GCOS — Ordres atelier</strong><a class="btn" href="admin.html">← Administration</a></header><main class="wrap"><section class="hero"><div><h1>Workflow atelier</h1><div class="muted">Planification, exécution, contrôle qualité et préparation de la facturation.</div></div><div class="actions"><a class="btn" href="devis.html">Créer depuis un devis</a><button class="btn primary" onclick="saveOrder()">Enregistrer</button></div></section><section class="stats"><article class="card stat"><span class="muted">À planifier</span><strong id="sPlan">0</strong></article><article class="card stat"><span class="muted">En cours</span><strong id="sProgress">0</strong></article><article class="card stat"><span class="muted">Terminés</span><strong id="sDone">0</strong></article><article class="card stat"><span class="muted">CA atelier TTC</span><strong id="sRevenue">0 €</strong></article></section><section class="layout"><aside class="card"><div class="filters"><input id="search" placeholder="Client, véhicule, devis" oninput="renderList()"><select id="statusFilter" onchange="renderList()"><option value="">Tous les statuts</option><option>À planifier</option><option>Planifié</option><option>En cours</option><option>Bloqué</option><option>Terminé</option><option>À facturer</option><option>Facturé</option></select></div><div id="orderList" class="list"></div></aside><article class="card" id="editor"><div id="empty" class="empty">Sélectionnez un ordre atelier.</div><div id="form" hidden><div class="head"><div><h2 id="orderTitle" style="margin:0"></h2><div class="muted" id="orderMeta"></div></div><span id="orderBadge" class="badge"></span></div><div class="summary"><div><span class="muted">Montant TTC</span><strong id="amount"></strong></div><div><span class="muted">Avancement</span><strong id="progress"></strong></div><div><span class="muted">Devis source</span><strong id="quoteNumber"></strong></div></div><div class="row"><div class="field"><label>Statut</label><select id="status"><option>À planifier</option><option>Planifié</option><option>En cours</option><option>Bloqué</option><option>Terminé</option><option>À facturer</option><option>Facturé</option></select></div><div class="field"><label>Date et heure prévues</label><input type="datetime-local" id="plannedAt"></div></div><div class="row"><div class="field"><label>Technicien responsable</label><input id="technician" placeholder="Nom du technicien"></div><div class="field"><label>Durée estimée (h)</label><input id="estimatedHours" type="number" min="0" step="0.5"></div></div><div class="field"><label>Checklist qualité</label><div id="checklist" class="checklist"></div></div><div class="row"><div class="field"><label>Glace consommée (kg)</label><input id="iceKg" type="number" min="0" step="0.1"></div><div class="field"><label>Dinitrol consommé (L)</label><input id="dinitrolL" type="number" min="0" step="0.1"></div></div><div class="row"><div class="field"><label>Temps réel (h)</label><input id="actualHours" type="number" min="0" step="0.25"></div><div class="field"><label>Prochain contrôle</label><input id="nextControl" type="date"></div></div><div class="field"><label>Observations atelier</label><textarea id="notes" rows="5"></textarea></div><div class="actions"><button class="btn primary" onclick="saveOrder()">Enregistrer</button><button class="btn warn" onclick="finishOrder()">Terminer et préparer facturation</button><button class="btn" onclick="createIntervention()">Créer le rapport</button><button class="btn danger" onclick="deleteOrder()">Supprimer</button></div></div></article></section></main><script src="storage.js"></script><script>let orders=[],clients=[],vehicles=[],quotes=[],currentId=null;const checks=[['reception','Réception véhicule'],['photosBefore','Photos avant'],['protection','Protection des zones sensibles'],['cryo','Cryonettoyage réalisé'],['dinitrol','Application Dinitrol'],['photosAfter','Photos après'],['quality','Contrôle qualité final']];const euro=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);const esc=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));function clientName(id){const c=clients.find(x=>x.id===id);return c?.name||[c?.firstName,c?.lastName].filter(Boolean).join(' ')||'Client'}function vehicleName(id){const v=vehicles.find(x=>x.id===id);return[v?.brand,v?.model,v?.plate].filter(Boolean).join(' — ')||'Véhicule'}function quoteName(id){return quotes.find(x=>x.id===id)?.number||'—'}function badgeClass(s){return s==='Terminé'||s==='À facturer'||s==='Facturé'?'done':s==='En cours'||s==='Planifié'?'progress':s==='Bloqué'?'blocked':''}function percent(o){const c=o.checklist||{},done=checks.filter(([k])=>c[k]).length;return Math.round(done/checks.length*100)}function renderList(){const q=search.value.toLowerCase(),sf=statusFilter.value;const list=orders.filter(o=>(!sf||o.status===sf)&&([clientName(o.clientId),vehicleName(o.vehicleId),quoteName(o.quoteId),o.title].join(' ').toLowerCase().includes(q))).sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));orderList.innerHTML=list.length?list.map(o=>'<div class="order '+(o.id===currentId?'active':'')+'" onclick="openOrder(\''+o.id+'\')"><div class="head"><strong>'+esc(vehicleName(o.vehicleId))+'</strong><span class="badge '+badgeClass(o.status)+'">'+esc(o.status)+'</span></div><div>'+esc(clientName(o.clientId))+'</div><div class="muted">'+esc(quoteName(o.quoteId))+' • '+percent(o)+' % • '+euro(o.amountTtc)+'</div></div>').join(''):'<div class="empty">Aucun ordre atelier.</div>';sPlan.textContent=orders.filter(o=>o.status==='À planifier'||o.status==='Planifié').length;sProgress.textContent=orders.filter(o=>o.status==='En cours'||o.status==='Bloqué').length;sDone.textContent=orders.filter(o=>['Terminé','À facturer','Facturé'].includes(o.status)).length;sRevenue.textContent=euro(orders.reduce((n,o)=>n+(+o.amountTtc||0),0))}function openOrder(id){const o=orders.find(x=>x.id===id);if(!o)return;currentId=id;empty.hidden=true;form.hidden=false;orderTitle.textContent=vehicleName(o.vehicleId);orderMeta.textContent=clientName(o.clientId)+' — '+(o.title||'Intervention atelier');orderBadge.textContent=o.status||'À planifier';orderBadge.className='badge '+badgeClass(o.status);amount.textContent=euro(o.amountTtc);progress.textContent=percent(o)+' %';quoteNumber.textContent=quoteName(o.quoteId);status.value=o.status||'À planifier';plannedAt.value=o.plannedAt?String(o.plannedAt).slice(0,16):'';technician.value=o.technician||'';estimatedHours.value=o.estimatedHours||'';iceKg.value=o.iceKg||'';dinitrolL.value=o.dinitrolL||'';actualHours.value=o.actualHours||'';nextControl.value=o.nextControl||'';notes.value=o.notes||'';checklist.innerHTML=checks.map(([k,l])=>'<label class="check"><input type="checkbox" data-check="'+k+'" '+(o.checklist?.[k]?'checked':'')+'><span>'+l+'</span></label>').join('');renderList()}async function saveOrder(){if(!currentId)return alert('Sélectionnez un ordre.');const o=orders.find(x=>x.id===currentId);const checklist={};document.querySelectorAll('[data-check]').forEach(x=>checklist[x.dataset.check]=x.checked);Object.assign(o,{status:status.value,plannedAt:plannedAt.value||null,technician:technician.value.trim(),estimatedHours:+estimatedHours.value||0,iceKg:+iceKg.value||0,dinitrolL:+dinitrolL.value||0,actualHours:+actualHours.value||0,nextControl:nextControl.value||null,notes:notes.value.trim(),checklist});await JarvisStorage.put('orders',o);await JarvisStorage.audit('order.saved','orders',o.id,{status:o.status,progress:percent(o)});await load();openOrder(o.id)}async function finishOrder(){if(!currentId)return;document.querySelectorAll('[data-check]').forEach(x=>x.checked=true);status.value='À facturer';if(!nextControl.value){const d=new Date();d.setFullYear(d.getFullYear()+1);nextControl.value=d.toISOString().slice(0,10)}await saveOrder();const o=orders.find(x=>x.id===currentId)||await JarvisStorage.get('orders',currentId);const queue=JSON.parse(localStorage.getItem('gcos-billing-queue')||'[]');if(!queue.some(x=>x.orderId===o.id)){queue.push({id:Date.now(),orderId:o.id,client:clientName(o.clientId),vehicle:vehicleName(o.vehicleId),readyAt:new Date().toISOString(),status:'À facturer',amountTtc:o.amountTtc});localStorage.setItem('gcos-billing-queue',JSON.stringify(queue))}alert('Intervention terminée et ajoutée à la facturation.')}async function createIntervention(){if(!currentId)return;await saveOrder();const o=await JarvisStorage.get('orders',currentId);let report=(await JarvisStorage.all('interventions')).find(x=>x.orderId===o.id);if(!report)report=await JarvisStorage.put('interventions',{orderId:o.id,clientId:o.clientId,vehicleId:o.vehicleId,quoteId:o.quoteId,status:'Rapport créé',technician:o.technician,iceKg:o.iceKg,dinitrolL:o.dinitrolL,actualHours:o.actualHours,checklist:o.checklist,notes:o.notes,nextControl:o.nextControl,createdAt:new Date().toISOString()});await JarvisStorage.audit('intervention.created','interventions',report.id,{orderId:o.id});alert('Rapport d’intervention créé.')}async function deleteOrder(){if(!currentId||!confirm('Supprimer cet ordre atelier ?'))return;await JarvisStorage.remove('orders',currentId);await JarvisStorage.audit('order.deleted','orders',currentId,{});currentId=null;form.hidden=true;empty.hidden=false;await load()}async function load(){[orders,clients,vehicles,quotes]=await Promise.all(['orders','clients','vehicles','quotes'].map(s=>JarvisStorage.all(s)));renderList()}load();</script></body></html>
