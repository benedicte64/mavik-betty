<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GCOS — Planning atelier</title><style>:root{--p:#171a21;--p2:#20242d;--t:#f7f7f8;--m:#a9afbd;--y:#ffd400;--g:#22c55e;--bd:#303641}*{box-sizing:border-box}body{margin:0;background:#0d0f13;color:var(--t);font-family:system-ui}.app{max-width:1100px;margin:auto;padding:16px}.top,.row{display:flex;justify-content:space-between;gap:10px;align-items:center}.btn{border:1px solid var(--bd);background:var(--p2);color:var(--t);border-radius:11px;padding:10px 13px;text-decoration:none}.primary{background:var(--y);color:#111;font-weight:900}.card{background:var(--p);border:1px solid var(--bd);border-radius:17px;padding:15px;margin:12px 0}.item{background:var(--p2);border-radius:13px;padding:13px;margin-top:9px}.muted{color:var(--m)}.badge{padding:5px 8px;border-radius:99px;background:#123e23;color:#8cf0a8}.actions{display:flex;gap:8px;flex-wrap:wrap}.modal{position:fixed;inset:0;background:#07090dee;display:none;place-items:center;padding:15px}.modal.open{display:grid}.box{width:min(620px,100%);background:var(--p);border-radius:18px;padding:20px}textarea,input{width:100%;background:#101319;color:var(--t);border:1px solid var(--bd);border-radius:10px;padding:10px;margin-top:8px}@media(max-width:650px){.top,.row{align-items:flex-start;flex-direction:column}}</style></head><body><div class="app"><header class="top"><div><h1>Planning atelier</h1><div class="muted">La programmation reste inchangée lorsque vous ajoutez ou validez des éléments.</div></div><div class="actions"><a class="btn" href="employe.html">Mode atelier</a><a class="btn" href="index.html">Accueil</a></div></header><div id="planning"></div></div><div class="modal" id="editModal"><div class="box"><h2 id="editTitle"></h2><textarea id="newElement" rows="4" placeholder="Ajouter une consigne, une préparation ou une note…"></textarea><div class="actions" style="margin-top:10px"><button class="btn primary" onclick="addElement()">Ajouter</button><button class="btn" onclick="editModal.classList.remove('open')">Fermer</button></div></div></div><script>let state=JSON.parse(localStorage.getItem('gcos-state')||'null')||{interventions:[]};if(!state.interventions?.length)state.interventions=[{id:'i1',client:'Béné',vehicle:'Mini blanche 2005',status:'Préparation',date:new Date().toISOString(),detail:'Cryonettoyage dessous, moteur, passages de roues et protection anticorrosion.'}];let selected=null;function save(){localStorage.setItem('gcos-state',JSON.stringify(state))}function extras(id){let all=JSON.parse(localStorage.getItem('gcos-planning-elements')||'{}');return all[id]||[]}function saveExtras(id,list){let all=JSON.parse(localStorage.getItem('gcos-planning-elements')||'{}');all[id]=list;localStorage.setItem('gcos-planning-elements',JSON.stringify(all))}function render(){planning.innerHTML=[...state.interventions].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(i=>{let list=extras(i.id);return'<section class="card"><div class="row"><div><h2 style="margin:0">'+i.vehicle+'</h2><div class="muted">'+i.client+' • '+new Date(i.date).toLocaleDateString('fr-FR')+'</div></div><span class="badge">'+i.status+'</span></div><p>'+(i.detail||'Intervention atelier')+'</p><div class="actions"><button class="btn primary" onclick="openEdit(\''+i.id+'\')">+ Ajouter un élément</button><button class="btn" onclick="prepare(\''+i.id+'\')">Préparer maintenant</button></div><div>'+list.map((e,n)=>'<div class="item row"><div><strong>'+(e.done?'✓ ':'')+e.text+'</strong><div class="muted">Ajouté le '+new Date(e.at).toLocaleString('fr-FR')+'</div></div><button class="btn" onclick="toggle(\''+i.id+'\','+n+')">'+(e.done?'Rouvrir':'Valider')+'</button></div>').join('')+'</div></section>'}).join('')}function openEdit(id){selected=id;editTitle.textContent='Ajouter un élément au véhicule';newElement.value='';editModal.classList.add('open')}function addElement(){let text=newElement.value.trim();if(!text)return;let list=extras(selected);list.push({text,done:false,at:new Date().toISOString()});saveExtras(selected,list);editModal.classList.remove('open');render()}function toggle(id,n){let list=extras(id);list[n].done=!list[n].done;saveExtras(id,list);render()}function prepare(id){localStorage.setItem('gcos-current-intervention',id);location.href='employe.html'}render();</script></body></html>
