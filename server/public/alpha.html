<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GCOS Alpha 0.6</title>
<style>:root{font-family:Inter,system-ui,sans-serif;color:#111;background:#f3f4f6}*{box-sizing:border-box}body{margin:0}.top{background:#111;color:#fff;padding:18px 24px;display:flex;justify-content:space-between}.wrap{max-width:1400px;margin:22px auto;padding:0 16px}.cards,.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(6,1fr)}.grid{grid-template-columns:repeat(2,1fr);margin-top:18px}.card,.panel{background:#fff;border-radius:14px;padding:17px;box-shadow:0 2px 12px #0001}.metric{font-size:28px;font-weight:800}label{display:block;font-size:13px;font-weight:700;margin:9px 0 4px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:9px;border:1px solid #d1d5db;border-radius:8px}textarea{min-height:70px}button{margin:5px 4px 0 0;border:0;border-radius:8px;padding:9px 12px;background:#111;color:#fff;font-weight:700;cursor:pointer}.secondary{background:#4b5563}.item{border-top:1px solid #e5e7eb;padding:11px 0}.muted{color:#6b7280;font-size:13px}.status{font-size:12px;padding:3px 7px;background:#e5e7eb;border-radius:999px}.ok{color:#166534}.error{color:#b91c1c}.wide{grid-column:1/-1}.progress{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:7px}.progress span{display:block;height:100%;background:#111}.actions{margin-top:8px}.checkgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:10px}.checkgrid label{font-weight:500;margin:0}@media(max-width:900px){.cards,.grid{grid-template-columns:1fr 1fr}}@media(max-width:620px){.cards,.grid,.checkgrid{grid-template-columns:1fr}}</style></head>
<body><header class="top"><div><h1 style="margin:0">GCOS — GentleCarE</h1><div class="muted" style="color:#ddd">Alpha 0.6 : gestion opérationnelle des interventions</div></div><span id="serverState">Connexion…</span></header>
<main class="wrap"><section class="cards"><div class="card">Clients<div class="metric" id="clientsCount">0</div></div><div class="card">Véhicules<div class="metric" id="vehiclesCount">0</div></div><div class="card">Interventions<div class="metric" id="interventionsCount">0</div></div><div class="card">Ouvertes<div class="metric" id="openCount">0</div></div><div class="card">Constats<div class="metric" id="observationsCount">0</div></div><div class="card">Messages<div class="metric" id="communicationsCount">0</div></div></section>
<section class="grid">
<div class="panel"><h2>Nouveau client</h2><form id="clientForm"><label>Nom complet</label><input name="name" required><label>Mobile</label><input name="mobile" type="tel" required><label>E-mail</label><input name="email" type="email"><label>Adresse</label><textarea name="address"></textarea><label>Canal préféré</label><select name="preferredChannel"><option>SMS</option><option>E-mail</option><option>Appel</option></select><label><input style="width:auto" type="checkbox" name="smsAllowed" checked> SMS autorisés</label><label><input style="width:auto" type="checkbox" name="emailAllowed" checked> E-mails autorisés</label><button>Enregistrer</button></form><div id="clientsList"></div></div>
<div class="panel"><h2>Nouveau véhicule</h2><form id="vehicleForm"><label>Client</label><select name="clientId" id="vehicleClient" required></select><label>Marque et modèle</label><input name="model" required><label>Immatriculation</label><input name="registration"><label>VIN</label><input name="vin"><label>Kilométrage</label><input name="mileage" type="number"><label>Année</label><input name="year" type="number"><button>Enregistrer</button></form><div id="vehiclesList"></div></div>
<div class="panel wide"><h2>Créer une intervention</h2><form id="interventionForm"><div class="grid" style="margin-top:0"><div><label>Véhicule</label><select name="vehicleId" id="interventionVehicle" required></select><label>Prestation</label><select name="service"><option>Cryonettoyage</option><option>Dinitrol</option><option>Pack Intégral Cryo + Dinitrol</option><option>Contrôle</option></select><label>Technicien</label><input name="technician" placeholder="David, Séverine…"></div><div><label>Date prévue</label><input name="scheduledDate" type="date"><label>Heure d’arrivée</label><input name="arrivalTime" type="time"><label>Kilométrage d’entrée</label><input name="mileage" type="number"></div></div><label>Notes</label><textarea name="notes"></textarea><input type="hidden" name="status" value="Prévue"><button>Créer l’intervention</button></form></div>
<div class="panel wide"><h2>Interventions actives</h2><div id="interventionsList"></div></div>
<div class="panel"><h2>Constat atelier</h2><form id="observationForm"><label>Intervention</label><select name="interventionId" id="observationIntervention" required></select><label>Zone / objet</label><input name="title" required><label>Gravité</label><select name="severity"><option>Information</option><option>À surveiller</option><option>Important</option><option>Urgent</option></select><label>Description</label><textarea name="description" required></textarea><label>Photo (lien provisoire)</label><input name="photoUrl" type="url"><button>Créer le constat</button></form><div id="observationsList"></div></div>
<div class="panel"><h2>Message client</h2><form id="communicationForm"><label>Client</label><select name="clientId" id="communicationClient" required></select><label>Constat associé</label><select name="observationId" id="communicationObservation"><option value="">Aucun</option></select><label>Canal</label><select name="channel"><option>SMS</option><option>E-mail</option></select><label>Message</label><textarea name="message" required></textarea><label>Photo jointe</label><input name="attachmentUrl" type="url"><input type="hidden" name="status" value="Brouillon"><button>Enregistrer le brouillon</button></form><div id="communicationsList"></div></div>
</section><p id="message" class="muted"></p></main>
<script>
const api='/api/local';let clients=[],vehicles=[],interventions=[],observations=[];const esc=(s='')=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function request(path,options={}){const r=await fetch(api+path,{headers:{'Content-Type':'application/json'},...options});const d=await r.json();if(!r.ok)throw new Error(d.error||'Erreur GCOS');return d}function data(f){return Object.fromEntries(new FormData(f).entries())}function msg(t,ok=true){message.textContent=t;message.className=ok?'ok':'error'}
const checklistLabels={receptionPhotos:'Photos réception',mileageRecorded:'Kilométrage',clientApproval:'Accord client',beforePhotos:'Photos avant',afterPhotos:'Photos après',finalControl:'Contrôle final',reportGenerated:'Rapport',clientSignature:'Signature'};
function completion(x){const values=Object.values(x.checklist||{});return values.length?Math.round(values.filter(Boolean).length/values.length*100):0}
async function patchIntervention(id,body){await request('/interventions/'+id,{method:'PATCH',body:JSON.stringify(body)});await refresh()}
window.setStatus=(id,status)=>patchIntervention(id,{status});window.toggleCheck=(id,key,value)=>{const x=interventions.find(i=>i.id===id);patchIntervention(id,{checklist:{...(x.checklist||{}),[key]:value}})};
async function refresh(){try{const [h,s,c,v,i,o,m]=await Promise.all([fetch('/health').then(r=>r.json()),request('/summary'),request('/clients'),request('/vehicles'),request('/interventions'),request('/observations'),request('/communications')]);serverState.textContent='Serveur '+h.version;clients=c.records;vehicles=v.records;interventions=i.records;observations=o.records;clientsCount.textContent=s.clients;vehiclesCount.textContent=s.vehicles;interventionsCount.textContent=s.interventions;openCount.textContent=s.openInterventions;observationsCount.textContent=s.observations;communicationsCount.textContent=s.communications;
const clientOpts=clients.length?clients.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join(''):'<option value="">Créer un client</option>';vehicleClient.innerHTML=clientOpts;communicationClient.innerHTML=clientOpts;interventionVehicle.innerHTML=vehicles.length?vehicles.map(x=>`<option value="${x.id}">${esc(x.model)} — ${esc(x.registration||'sans plaque')}</option>`).join(''):'<option value="">Créer un véhicule</option>';const intOpts=interventions.length?interventions.map(x=>`<option value="${x.id}">${esc(x.number||'Sans numéro')} — ${esc(x.service)}</option>`).join(''):'<option value="">Créer une intervention</option>';observationIntervention.innerHTML=intOpts;communicationObservation.innerHTML='<option value="">Aucun</option>'+observations.map(x=>`<option value="${x.id}">${esc(x.title)}</option>`).join('');
clientsList.innerHTML=clients.slice(0,5).map(x=>`<div class="item"><strong>${esc(x.name)}</strong><div class="muted">${esc(x.mobile||'')} · ${esc(x.email||'')}</div></div>`).join('');vehiclesList.innerHTML=vehicles.slice(0,5).map(x=>`<div class="item"><strong>${esc(x.model)}</strong><div class="muted">${esc(x.registration||'Sans plaque')} · ${esc(x.mileage||0)} km</div></div>`).join('');
interventionsList.innerHTML=interventions.map(x=>{const v=vehicles.find(y=>y.id===x.vehicleId),p=completion(x);return `<div class="item"><strong>${esc(x.number||'Intervention')}</strong> — ${esc(v?.model||'Véhicule inconnu')} <span class="status">${esc(x.status)}</span><div class="muted">${esc(x.service)} · ${esc(x.scheduledDate||'date non définie')} · ${esc(x.technician||'technicien non affecté')} · ${esc(x.mileage||0)} km</div><div class="progress"><span style="width:${p}%"></span></div><div class="muted">Dossier complété à ${p}%</div><div class="checkgrid">${Object.entries(checklistLabels).map(([k,l])=>`<label><input type="checkbox" style="width:auto" ${x.checklist?.[k]?'checked':''} onchange="toggleCheck('${x.id}','${k}',this.checked)"> ${l}</label>`).join('')}</div><div class="actions"><button onclick="setStatus('${x.id}','En cours')">Démarrer</button><button class="secondary" onclick="setStatus('${x.id}','Contrôle')">Contrôle</button><button class="secondary" onclick="setStatus('${x.id}','Terminée')">Terminer</button><button class="secondary" onclick="setStatus('${x.id}','Livrée')">Livrée</button></div></div>`}).join('')||'<div class="muted">Aucune intervention.</div>';
observationsList.innerHTML=observations.slice(0,6).map(x=>`<div class="item"><strong>${esc(x.title)}</strong> <span class="status">${esc(x.severity)}</span><div class="muted">${esc(x.description)}</div></div>`).join('');communicationsList.innerHTML=m.records.slice(0,6).map(x=>`<div class="item"><strong>${esc(x.channel)} — ${esc(x.status)}</strong><div class="muted">${esc(x.message)}</div></div>`).join('')}catch(e){serverState.textContent='Serveur indisponible';msg(e.message,false)}}
for(const [id,path] of [['clientForm','/clients'],['vehicleForm','/vehicles'],['interventionForm','/interventions'],['observationForm','/observations'],['communicationForm','/communications']])document.querySelector('#'+id).addEventListener('submit',async e=>{e.preventDefault();try{await request(path,{method:'POST',body:JSON.stringify(data(e.currentTarget))});e.currentTarget.reset();msg('Enregistrement effectué.');await refresh()}catch(err){msg(err.message,false)}});refresh();
</script></body></html>
