<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Jarvis GCOS</title><style>:root{font-family:Inter,system-ui,sans-serif;color:#f8fafc;background:#070b12}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#070b12,#111827);min-height:100vh}.wrap{max-width:760px;margin:auto;padding:20px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.badge{font-size:12px;background:#16351f;color:#8ef0a7;padding:6px 10px;border-radius:99px}.panel{background:#111827;border:1px solid #263244;border-radius:18px;padding:18px;box-shadow:0 16px 50px #0006}.answer{font-size:22px;line-height:1.35;min-height:100px;white-space:pre-wrap}.chips{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.chips button{background:#1f2937;border:1px solid #374151}form{display:flex;gap:8px}input{flex:1;min-width:0;border:1px solid #374151;background:#0b1220;color:#fff;padding:14px;border-radius:12px;font-size:16px}button{border:0;background:#f3f4f6;color:#111827;padding:13px 16px;border-radius:12px;font-weight:800}.voice{font-size:20px}.muted{color:#94a3b8;font-size:13px;margin-top:14px}a{color:#cbd5e1}</style></head><body><main class="wrap"><div class="head"><div><h1 style="margin:0">JARVIS</h1><div style="color:#94a3b8">Assistant opérationnel GentleCarE</div></div><span class="badge" id="state">Connexion</span></div><section class="panel"><div class="answer" id="answer">Démarrage de Jarvis…</div><div class="chips"><button onclick="ask('Fais-moi le point du jour')">Point du jour</button><button onclick="ask('Interventions actives')">Atelier</button><button onclick="ask('Combien de clients ?')">Clients</button><button onclick="ask('Combien de véhicules ?')">Véhicules</button></div><form id="form"><input id="command" autocomplete="off" placeholder="Parlez ou écrivez à Jarvis"><button type="button" class="voice" id="voice">🎙️</button><button>Envoyer</button></form><div class="muted">Jarvis 0.7 local · <a href="/">Retour à GCOS</a></div></section></main><script>const answer=document.querySelector('#answer'),state=document.querySelector('#state'),command=document.querySelector('#command');async function ask(text){answer.textContent='Analyse…';try{const r=await fetch('/api/jarvis/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});const d=await r.json();if(!r.ok)throw new Error(d.error);answer.textContent=d.answer;state.textContent='En ligne'}catch(e){answer.textContent='Erreur : '+e.message;state.textContent='Hors ligne'}}document.querySelector('#form').onsubmit=e=>{e.preventDefault();const text=command.value.trim();if(text){ask(text);command.value=''}};document.querySelector('#voice').onclick=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){answer.textContent='La dictée vocale n’est pas disponible dans ce navigateur.';return}const r=new SR();r.lang='fr-FR';r.interimResults=false;r.onresult=e=>{const text=e.results[0][0].transcript;command.value=text;ask(text)};r.onerror=()=>answer.textContent='Je n’ai pas compris. Réessayez.';r.start()};fetch('/api/jarvis/brief').then(r=>r.json()).then(d=>{answer.textContent=d.greeting;state.textContent='En ligne'}).catch(()=>state.textContent='Hors ligne');</script></body></html>
