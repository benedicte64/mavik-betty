<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>GCOS — Dossier véhicule 360°</title><meta name="theme-color" content="#07131a"><style>:root{--line:#24424d;--txt:#f4fbfd;--muted:#87a1aa;--green:#79d45d;--amber:#f0b54a;--red:#ef6363;--cyan:#57d7ef}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#071318,#04090c);color:var(--txt);font-family:Inter,system-ui,sans-serif;min-height:100vh}.top{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(5,15,19,.95);border-bottom:1px solid var(--line)}.wrap{max-width:1500px;margin:auto;padding:18px}.hero,.card{border:1px solid var(--line);background:linear-gradient(180deg,#0d2028,#09171d);border-radius:18px}.hero{padding:20px;display:flex;justify-content:space-between;gap:12px;align-items:end}.hero h1{margin:0 0 5px}.muted{color:var(--muted)}.btn{border:1px solid var(--line);background:#10242c;color:var(--txt);border-radius:10px;padding:10px 13px;cursor:pointer;text-decoration:none}.btn.primary{background:#275f40;border-color:#438d60;font-weight:800}.layout{display:grid;grid-template-columns:340px 1fr;gap:14px;margin-top:14px}.card{padding:15px}.field{display:grid;gap:5px;margin-bottom:10px}label{font-size:.8rem;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#07151b;color:var(--txt);padding:10px}.list{display:grid;gap:8px;max-height:70vh;overflow:auto}.vehicle{border:1px solid var(--line);border-radius:13px;padding:12px;background:#0a1a21;cursor:pointer}.vehicle:hover,.vehicle.active{border-color:var(--cyan)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}.stat{border:1px solid var(--line);border-radius:13px;padding:12px;background:#08161c}.stat strong{display:block;font-size:1.35rem;margin-top:5px}.tabs{display:flex;gap:7px;overflow:auto;margin-bottom:12px}.tab{white-space:nowrap}.tab.active{border-color:var(--cyan);color:#9cefff}.panel{display:none}.panel.active{display:block}.timeline{display:grid;gap:9px}.event{border-left:3px solid var(--cyan);padding:10px 12px;background:#0a1a21;border-radius:0 12px 12px 0}.event.done{border-left-color:var(--green)}.event.warn{border-left-color:var(--amber)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.doc,.photo,.diagnostic{border:1px solid var(--line);border-radius:12px;padding:12px;background:#0a1a21}.photo img{width:100%;height:180px;object-fit:cover;border-radius:9px;background:#07151b}.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#173d2c;color:#9df0b7;font-size:.72rem}.badge.warn{background:#4a3517;color:#ffd178}.badge.danger{background:#4a2020;color:#ffb2b2}.empty{text-align:center;padding:30px;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}@media(max-width:900px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.wrap{padding:10px 10px 80px}.hero{align-items:flex-start}.list{max-height:none}}</style></head><body><header class="top"><strong>GCOS — Dossier véhicule 360°</strong><a class="btn" href="admin.html">← Administration</a></header><main class="wrap"><section class="hero"><div><h1>Historique véhicule centralisé</h1><div class="muted">Devis, ordres, rapports, contrôles, consommations et diagnostic Jarvis.</div></div><div class="actions"><a class="btn" href="clients.html">Clients et véhicules</a><button class="btn primary" onclick="saveVehicle()">Enregistrer la fiche</button></div></section><section class="layout"><aside class="card"><div class="field"><input id="search" placeholder="Immatriculation, marque, client" oninput="renderVehicles()"></div><div id="vehicleList" class="list"></div></aside><article class="card"><div id="empty" class="empty">Sélectionnez un véhicule.</div><div id="record" hidden><div class="grid"><div><h2 id="title" style="margin:0 0 4px"></h2><div id="owner" class="muted"></div></div><div class="actions" style="justify-content:flex-end"><span id="healthBadge" class="badge"></span><button class="btn" onclick="openClient()">Ouvrir le client</button></div></div><div class="stats"><div class="stat"><span class="muted">Devis</span><strong id="quoteCount">0</strong></div><div class="stat"><span class="muted">Interventions</span><strong id="interventionCount">0</strong></div><div class="stat"><span class="muted">CA TTC</span><strong id="revenue">0 €</strong></div><div class="stat"><span class="muted">Prochain contrôle</span><strong id="nextControl">—</strong></div></div><div class="tabs"><button class="btn tab active" data-tab="identity">Identité</button><button class="btn tab" data-tab="timeline">Chronologie</button><button class="btn tab" data-tab="technical">Technique</button><button class="btn tab" data-tab="documents">Documents</button><button class="btn tab" data-tab="photos">Photos</button><button class="btn tab" data-tab="jarvis">Analyse Jarvis</button></div><section id="identity" class="panel active"><div class="grid"><div class="field"><label>Marque</label><input id="brand"></div><div class="field"><label>Modèle</label><input id="model"></div><div class="field"><label>Immatriculation</label><input id="plate"></div><div class="field"><label>VIN</label><input id="vin"></div><div class="field"><label>Motorisation</label><input id="engine"></div><div class="field"><label>Kilométrage</label><input id="mileage" type="number" min="0"></div></div><div class="field"><label>Observations permanentes</label><textarea id="notes" rows="5"></textarea></div></section><section id="timeline" class="panel"><div id="timelineList" class="timeline"></div></section><section id="technical" class="panel"><div id="technicalList" class="grid"></div></section><section id="documents" class="panel"><div id="documentList" class="grid"></div></section><section id="photos" class="panel"><div class="field"><label>Ajouter des photos au dossier</label><input id="photoInput" type="file" accept="image/*" multiple onchange="addPhotos(event)"></div><div id="photoList" class="grid"></div></section><section id="jarvis" class="panel"><div id="diagnostics" class="timeline"></div></section></div></article></section></main><script src="storage.js"></script><script>let vehicles=[],clients=[],quotes=[],orders=[],interventions=[],documents=[],currentId=null;const euro=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0),esc=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));function clientName(id){const c=clients.find(x=>x.id===id);return c?.name||[c?.firstName,c?.lastName].filter(Boolean).join(' ')||'Client non renseigné'}function vehicleName(v){return[v?.brand,v?.model,v?.plate].filter(Boolean).join(' — ')||'Véhicule'}function related(){return{q:quotes.filter(x=>x.vehicleId===currentId),o:orders.filter(x=>x.vehicleId===currentId),i:interventions.filter(x=>x.vehicleId===currentId),d:documents.filter(x=>x.vehicleId===currentId)}}function renderVehicles(){const q=search.value.toLowerCase();const list=vehicles.filter(v=>(vehicleName(v)+' '+clientName(v.clientId)).toLowerCase().includes(q));vehicleList.innerHTML=list.length?list.map(v=>'<div class="vehicle '+(v.id===currentId?'active':'')+'" onclick="openVehicle(\''+v.id+'\')"><strong>'+esc(vehicleName(v))+'</strong><div class="muted">'+esc(clientName(v.clientId))+'</div></div>').join(''):'<div class="empty">Aucun véhicule.</div>'}function openVehicle(id){const v=vehicles.find(x=>x.id===id);if(!v)return;currentId=id;empty.hidden=true;record.hidden=false;title.textContent=vehicleName(v);owner.textContent=clientName(v.clientId);brand.value=v.brand||'';model.value=v.model||'';plate.value=v.plate||'';vin.value=v.vin||'';engine.value=v.engine||'';mileage.value=v.mileage||'';notes.value=v.notes||'';renderRecord();renderVehicles()}function renderRecord(){const v=vehicles.find(x=>x.id===currentId),r=related();quoteCount.textContent=r.q.length;interventionCount.textContent=r.i.length;revenue.textContent=euro(r.o.reduce((n,x)=>n+(+x.amountTtc||0),0));const dates=r.o.map(x=>x.nextControl).filter(Boolean).sort();nextControl.textContent=dates[0]?new Date(dates[0]+'T12:00:00').toLocaleDateString('fr-FR'):'—';const events=[];r.q.forEach(x=>events.push({date:x.date||x.updatedAt,type:'Devis',title:x.number+' — '+(x.status||'Brouillon'),text:euro(x.ttc)}));r.o.forEach(x=>events.push({date:x.plannedAt||x.updatedAt,type:'Ordre atelier',title:x.title||'Intervention',text:(x.status||'À planifier')+' • '+euro(x.amountTtc),cls:['Terminé','À facturer','Facturé'].includes(x.status)?'done':''}));r.i.forEach(x=>events.push({date:x.createdAt||x.updatedAt,type:'Rapport',title:'Rapport d’intervention',text:(x.iceKg||0)+' kg de glace • '+(x.dinitrolL||0)+' L Dinitrol',cls:'done'}));timelineList.innerHTML=events.length?events.sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(e=>'<div class="event '+(e.cls||'')+'"><strong>'+esc(e.type)+' — '+esc(e.title)+'</strong><div>'+esc(e.text)+'</div><div class="muted">'+(e.date?new Date(e.date).toLocaleString('fr-FR'):'Date inconnue')+'</div></div>').join(''):'<div class="empty">Aucun événement.</div>';technicalList.innerHTML=r.i.length?r.i.sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt))).map(x=>'<div class="doc"><strong>'+new Date(x.createdAt||x.updatedAt).toLocaleDateString('fr-FR')+'</strong><div>Cryo : '+(x.iceKg||0)+' kg</div><div>Dinitrol : '+(x.dinitrolL||0)+' L</div><div>Temps réel : '+(x.actualHours||0)+' h</div><div>Technicien : '+esc(x.technician||'Non renseigné')+'</div></div>').join(''):'<div class="empty">Aucune donnée technique.</div>';documentList.innerHTML=[...r.d.map(x=>({name:x.name||x.filename||'Document',type:x.type||'Document',date:x.createdAt||x.updatedAt})),...r.q.map(x=>({name:x.number,type:'Devis '+x.status,date:x.date})),...r.i.map(x=>({name:'Rapport intervention',type:'Rapport atelier',date:x.createdAt}))].sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(x=>'<div class="doc"><strong>'+esc(x.name)+'</strong><div>'+esc(x.type)+'</div><div class="muted">'+(x.date?new Date(x.date).toLocaleDateString('fr-FR'):'')+'</div></div>').join('')||'<div class="empty">Aucun document.</div>';renderPhotos(v);renderDiagnostics(v,r)}function renderPhotos(v){const photos=v.photos||[];photoList.innerHTML=photos.length?photos.map((p,i)=>'<div class="photo"><img src="'+p.data+'" alt="Photo véhicule"><div class="muted">'+new Date(p.createdAt).toLocaleString('fr-FR')+'</div><button class="btn" onclick="removePhoto('+i+')">Supprimer</button></div>').join(''):'<div class="empty">Aucune photo.</div>'}function renderDiagnostics(v,r){const d=[],now=new Date();const controls=r.o.map(x=>x.nextControl).filter(Boolean).sort();if(!v.vin)d.push(['warn','VIN manquant','Compléter le numéro de série pour fiabiliser le dossier.']);if(!v.mileage)d.push(['warn','Kilométrage absent','Renseigner le kilométrage actuel du véhicule.']);if(!r.q.length)d.push(['warn','Aucun devis','Aucune proposition commerciale n’est rattachée à ce véhicule.']);if(r.i.length&&!v.photos?.length)d.push(['danger','Photos manquantes','Une intervention existe sans galerie avant/après dans le dossier.']);if(controls[0]&&new Date(controls[0]+'T23:59:59')<now)d.push(['danger','Contrôle en retard','Le prochain contrôle programmé est dépassé.']);if(!controls.length&&r.i.length)d.push(['warn','Contrôle non programmé','Définir une date de contrôle annuel après intervention.']);const incomplete=r.o.filter(x=>{const c=x.checklist||{};return Object.keys(c).length&&Object.values(c).some(v=>!v)});if(incomplete.length)d.push(['warn','Checklist incomplète',incomplete.length+' ordre(s) atelier comportent des étapes non validées.']);if(!d.length)d.push(['ok','Dossier cohérent','Aucune anomalie détectée par Jarvis.']);healthBadge.textContent=d.some(x=>x[0]==='danger')?'À corriger':d.some(x=>x[0]==='warn')?'À compléter':'Dossier complet';healthBadge.className='badge '+(d.some(x=>x[0]==='danger')?'danger':d.some(x=>x[0]==='warn')?'warn':'');diagnostics.innerHTML=d.map(x=>'<div class="diagnostic event '+(x[0]==='danger'?'warn':'')+'"><strong>'+esc(x[1])+'</strong><div>'+esc(x[2])+'</div></div>').join('')}async function saveVehicle(){if(!currentId)return alert('Sélectionnez un véhicule.');const v=vehicles.find(x=>x.id===currentId);Object.assign(v,{brand:brand.value.trim(),model:model.value.trim(),plate:plate.value.trim().toUpperCase(),vin:vin.value.trim().toUpperCase(),engine:engine.value.trim(),mileage:+mileage.value||0,notes:notes.value.trim()});await JarvisStorage.put('vehicles',v);await JarvisStorage.audit('vehicle.saved','vehicles',v.id,{plate:v.plate});await load();openVehicle(v.id);alert('Fiche véhicule enregistrée.')}async function addPhotos(e){if(!currentId)return;const v=vehicles.find(x=>x.id===currentId),files=[...e.target.files];v.photos=v.photos||[];for(const file of files){if(file.size>3*1024*1024){alert(file.name+' dépasse 3 Mo.');continue}const data=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)});v.photos.push({name:file.name,data,createdAt:new Date().toISOString()})}await JarvisStorage.put('vehicles',v);await JarvisStorage.audit('vehicle.photos.added','vehicles',v.id,{count:files.length});e.target.value='';await load();openVehicle(v.id)}async function removePhoto(i){const v=vehicles.find(x=>x.id===currentId);v.photos.splice(i,1);await JarvisStorage.put('vehicles',v);await load();openVehicle(v.id)}function openClient(){const v=vehicles.find(x=>x.id===currentId);location.href='clients.html?client='+encodeURIComponent(v?.clientId||'')}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.panel').forEach(x=>x.classList.toggle('active',x.id===b.dataset.tab))});async function load(){[vehicles,clients,quotes,orders,interventions,documents]=await Promise.all(['vehicles','clients','quotes','orders','interventions','documents'].map(s=>JarvisStorage.all(s)));renderVehicles()}load();</script></body></html>
